<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Roteirizador Inteligente</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#map{
height:100vh;
}

.painel{

position:absolute;
top:20px;
left:20px;

background:#1c1c1c;
padding:20px;
border-radius:10px;
width:360px;
z-index:1000;

}

.resultado{

position:absolute;
top:20px;
right:20px;

background:#1c1c1c;
padding:20px;
border-radius:10px;
width:280px;
max-height:85vh;
overflow:auto;

}

input{

width:75%;
padding:8px;
border:none;
border-radius:6px;

}

button{

padding:8px;
border:none;
border-radius:6px;
cursor:pointer;

}

.add{
background:#2ecc71;
color:white;
margin-top:8px;
width:100%;
}

.calcular{
background:#3498db;
color:white;
margin-top:8px;
width:100%;
}

.rotaItem{

margin-top:6px;
background:#2a2a2a;
padding:6px;
border-radius:6px;
display:flex;
justify-content:space-between;
align-items:center;

}

.lixeira{
background:#e74c3c;
color:white;
padding:4px 6px;
}

.loading{
display:none;
margin-top:10px;
text-align:center;
}

.spinner{
border:4px solid #444;
border-top:4px solid #2ecc71;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>

</head>

<body>

<div class="painel">

<h3>Rotas</h3>

<input id="endereco" placeholder="Digite o endereço">

<button onclick="adicionarRota()" class="add">Adicionar outra rota</button>

<button onclick="calcularRota()" class="calcular">Gerar rota otimizada</button>

<div id="listaRotas"></div>

<div class="loading" id="loading">

<div class="spinner"></div>
Calculando rota...

</div>

</div>

<div class="resultado">

<h3>Resultado</h3>

<div id="distancias"></div>

<div id="total"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

var map=L.map('map').setView([-22.9,-43.2],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let rotas=[]
let marcadores=[]
let polyline=null

function adicionarRota(){

let endereco=document.getElementById("endereco").value

if(endereco==""){
alert("Digite um endereço")
return
}

fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${endereco}`)

.then(r=>r.json())

.then(data=>{

let lat=data[0].lat
let lon=data[0].lon
let nome=data[0].display_name

let marker=L.marker([lat,lon],{draggable:true}).addTo(map)

marker.bindPopup(nome)

marker.on("dragend",function(){

let pos=marker.getLatLng()
rotas[marcadores.indexOf(marker)]=[pos.lng,pos.lat]

})

marcadores.push(marker)
rotas.push([parseFloat(lon),parseFloat(lat)])

atualizarLista(nome)

map.setView([lat,lon],14)

document.getElementById("endereco").value=""

})

}

function atualizarLista(nome){

let lista=document.getElementById("listaRotas")

let index=marcadores.length-1

let div=document.createElement("div")

div.className="rotaItem"

div.id="rota"+index

div.innerHTML=

`<span>${nome}</span>

<button class="lixeira" onclick="remover(${index})">🗑</button>`

lista.appendChild(div)

}

function remover(i){

map.removeLayer(marcadores[i])

marcadores.splice(i,1)
rotas.splice(i,1)

document.getElementById("rota"+i).remove()

}

async function calcularRota(){

if(rotas.length<2){
alert("Adicione pelo menos 2 rotas")
return
}

document.getElementById("loading").style.display="block"

if(polyline){
map.removeLayer(polyline)
}

let response=await fetch(
"https://api.openrouteservice.org/v2/directions/driving-car/geojson",

{

method:"POST",

headers:{
"Authorization":API,
"Content-Type":"application/json"
},

body:JSON.stringify({
coordinates:rotas,
optimize_waypoints:true
})

})

let data=await response.json()

document.getElementById("loading").style.display="none"

let coords=data.features[0].geometry.coordinates

let latlngs=coords.map(c=>[c[1],c[0]])

polyline=L.polyline(latlngs,{color:"cyan"}).addTo(map)

map.fitBounds(polyline.getBounds())

mostrarDistancias(data)

}

function mostrarDistancias(data){

let seg=data.features[0].properties.segments[0]

let totalKm=seg.distance/1000

let valor=totalKm*0.85

document.getElementById("distancias").innerHTML=

`Distância total: ${totalKm.toFixed(2)} km`

document.getElementById("total").innerHTML=

`Valor total: R$ ${valor.toFixed(2)}`

}

</script>

</body>

</html>

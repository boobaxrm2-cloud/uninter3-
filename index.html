<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ROTEIRIZADOR DE VISITAS FLUXOMED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/leaflet-image/leaflet-image.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
overflow:hidden;
}

#map{
position:absolute;
right:0;
top:0;
width:72%;
height:100%;
}

.panel{
position:absolute;
left:0;
top:0;
width:28%;
height:100%;
background:#111827;
padding:25px;
box-shadow:5px 0 40px rgba(0,0,0,0.6);
z-index:1000;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:#38bdf8;
}

input{
width:100%;
padding:10px;
margin-top:10px;
background:#0b0f1a;
border:1px solid #1f2937;
color:white;
border-radius:8px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.add{background:#2563eb;color:white;}
.route{background:#22c55e;color:white;}
.delete{background:#ef4444;color:white;}
.clear{background:#f59e0b;color:white;}

.autocomplete{
position:relative;
}

.suggestions{
position:absolute;
background:#1f2937;
width:100%;
max-height:150px;
overflow:auto;
border-radius:5px;
z-index:2000;
}

.suggestions div{
padding:8px;
cursor:pointer;
}

.suggestions div:hover{
background:#374151;
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000c;
padding:30px;
border-radius:10px;
display:none;
z-index:2000;
}

.spinner{
border:5px solid #1f2937;
border-top:5px solid #38bdf8;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.result{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:25px;
border-radius:10px;
display:none;
z-index:3000;
width:350px;
}

</style>
</head>

<body>

<div class="panel">

<div class="title">ROTEIRIZADOR DE VISITAS FLUXOMED</div>

<label>Técnico</label>
<input id="tecnico">

<div id="addresses"></div>

<button class="add" onclick="addAddress()">Adicionar endereço</button>
<button class="delete" onclick="removeAddress()">Excluir último endereço</button>
<button class="clear" onclick="clearRoutes()">Limpar rotas</button>

<div style="margin-top:10px">
<input type="checkbox" id="almoco"> Incluir almoço (R$25,90)
</div>

<button class="route" onclick="calcularRota()">Roteirizar rota</button>

</div>

<div id="map"></div>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div class="result" id="resultado"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const apiKey="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

let map=L.map('map').setView([-22.9,-43.2],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let coords=[]
let markers=[]
let addresses=[]
let rotaLayer=null

function addAddress(){

let container=document.createElement("div")
container.className="autocomplete"

let input=document.createElement("input")
input.placeholder="Digite endereço"

let suggestions=document.createElement("div")
suggestions.className="suggestions"

container.appendChild(input)
container.appendChild(suggestions)

document.getElementById("addresses").appendChild(container)

input.addEventListener("input",async ()=>{

let q=input.value

if(q.length<3) return

let res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
let data=await res.json()

suggestions.innerHTML=""

data.slice(0,5).forEach(place=>{

let item=document.createElement("div")
item.innerText=place.display_name

item.onclick=()=>{

input.value=place.display_name
suggestions.innerHTML=""

let lat=place.lat
let lon=place.lon

coords.push([lon,lat])
addresses.push(place.display_name)

let marker=L.marker([lat,lon]).addTo(map)

markers.push(marker)

map.setView([lat,lon],13)

}

suggestions.appendChild(item)

})

})

}

function removeAddress(){

if(markers.length==0) return

map.removeLayer(markers.pop())

coords.pop()
addresses.pop()

let list=document.getElementById("addresses")
list.removeChild(list.lastChild)

}

function clearRoutes(){

markers.forEach(m=>map.removeLayer(m))

markers=[]
coords=[]
addresses=[]

if(rotaLayer) map.removeLayer(rotaLayer)

document.getElementById("addresses").innerHTML=""

}

async function calcularRota(){

if(coords.length<2){
alert("Adicione pelo menos dois endereços")
return
}

document.getElementById("loading").style.display="block"

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":apiKey
},
body:JSON.stringify({coordinates:coords})
})

let data=await res.json()

document.getElementById("loading").style.display="none"

let km=data.routes[0].summary.distance/1000

let valor=km*0.85

let almoco=document.getElementById("almoco").checked

if(almoco) valor+=25.90

let html=`
<h2>Resumo da rota</h2>
<p>Kilometragem: ${km.toFixed(2)} km</p>
<p>Total: R$${valor.toFixed(2)}</p>

<button onclick="baixarPDF(${km},${valor})">Baixar PDF</button>
<button onclick="fechar()">Fechar</button>
`

document.getElementById("resultado").innerHTML=html
document.getElementById("resultado").style.display="block"

let geo=data.routes[0].geometry

if(rotaLayer) map.removeLayer(rotaLayer)

rotaLayer=L.geoJSON(geo,{style:{color:"#22c55e",weight:5}}).addTo(map)

}

function fechar(){
document.getElementById("resultado").style.display="none"
}

function baixarPDF(km,total){

leafletImage(map,function(err,canvas){

let img=canvas.toDataURL("image/png")

const {jsPDF}=window.jspdf

let pdf=new jsPDF()

let tecnico=document.getElementById("tecnico").value

pdf.text("ROTEIRIZADOR FLUXOMED",10,10)
pdf.text("Técnico: "+tecnico,10,20)

let y=30

addresses.forEach((a,i)=>{
pdf.text((i+1)+" - "+a,10,y)
y+=8
})

pdf.text("Distância: "+km.toFixed(2)+" km",10,y+10)
pdf.text("Total: R$"+total.toFixed(2),10,y+18)

pdf.addImage(img,"PNG",10,y+25,180,90)

pdf.save("rota_fluxomed.pdf")

})

}

addAddress()
addAddress()

</script>

</body>
</html>

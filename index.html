<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ROTEIRIZADOR DE VISITAS FLUXOMED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI,Arial;
background:#0b0f19;
color:white;
overflow:hidden;
}

/* MAPA */

#map{
position:absolute;
right:0;
top:0;
height:100%;
width:72%;
}

/* PAINEL */

.panel{

position:absolute;
left:0;
top:0;
height:100%;
width:28%;

background:#111827;

padding:30px;

box-shadow: 15px 0px 40px rgba(0,0,0,0.6);
border-right:1px solid rgba(255,255,255,0.05);

z-index:10;
}

.panel::after{
content:"";
position:absolute;
right:-40px;
top:0;
width:40px;
height:100%;
background:linear-gradient(to right,#111827,transparent);
}

h1{
font-size:20px;
margin-bottom:25px;
color:#3b82f6;
}

label{
font-size:13px;
opacity:0.8;
}

input{
width:100%;
padding:12px;
margin-top:5px;
margin-bottom:12px;
border:none;
border-radius:8px;
background:#1f2937;
color:white;
font-size:14px;
}

/* BOTÕES */

button{

width:100%;
padding:12px;

border:none;
border-radius:8px;

margin-top:10px;

cursor:pointer;
font-weight:600;
transition:0.2s;

}

button:hover{
transform:translateY(-1px);
}

.btn-add{
background:#2563eb;
color:white;
}

.btn-route{
background:#10b981;
}

.btn-pdf{
background:#9333ea;
}

/* ENDEREÇOS */

.address{
position:relative;
}

/* AUTOCOMPLETE */

.suggestions{

position:absolute;
top:46px;
left:0;
right:0;

background:#1f2937;

border-radius:8px;

max-height:160px;
overflow:auto;

box-shadow:0px 10px 25px rgba(0,0,0,0.4);

z-index:9999;

}

.suggestions div{

padding:10px;
font-size:13px;

cursor:pointer;

border-bottom:1px solid rgba(255,255,255,0.03);

}

.suggestions div:hover{
background:#374151;
}

/* TOGGLE */

.switch{

position:relative;
display:inline-block;
width:46px;
height:24px;
margin-right:10px;

}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{

position:absolute;
cursor:pointer;

top:0;
left:0;
right:0;
bottom:0;

background:#374151;

border-radius:24px;

transition:.3s;

}

.slider:before{

position:absolute;
content:"";

height:18px;
width:18px;

left:3px;
bottom:3px;

background:white;

border-radius:50%;

transition:.3s;

}

input:checked + .slider{
background:#10b981;
}

input:checked + .slider:before{
transform:translateX(22px);
}

.toggle-row{
display:flex;
align-items:center;
margin-top:5px;
}

/* RESULTADO */

#resultado{

margin-top:20px;
padding:12px;

background:#1f2937;
border-radius:8px;

font-size:14px;
line-height:1.6;

}

/* MARCADORES */

.marker-number{

background:#2563eb;

color:white;

border-radius:50%;

width:28px;
height:28px;

display:flex;
align-items:center;
justify-content:center;

font-weight:bold;

box-shadow:0px 3px 10px rgba(0,0,0,0.4);

}

.loader{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

background:#111827;

padding:20px 30px;

border-radius:10px;

display:none;

box-shadow:0px 0px 30px rgba(0,0,0,0.5);

}

</style>
</head>

<body>

<div class="panel">

<h1>ROTEIRIZADOR DE VISITAS FLUXOMED</h1>

<label>Técnico</label>
<input id="tecnico">

<div id="enderecos"></div>

<button class="btn-add" onclick="addEndereco()">Adicionar endereço</button>

<div class="toggle-row">

<label class="switch">
<input type="checkbox" id="almoco">
<span class="slider"></span>
</label>

<span>Incluir almoço (R$25,90)</span>

</div>

<button class="btn-route" onclick="roteirizar()">Roteirizar rota</button>

<button class="btn-pdf" onclick="exportPDF()">Exportar PDF</button>

<div id="resultado"></div>

</div>

<div id="map"></div>

<div id="loader" class="loader">Calculando rota...</div>

<script>

const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

let map=L.map('map').setView([-22.9,-43.2],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let routeLayer=null
let markers=[]
let visitOrder=[]
let totalDist=0

function addEndereco(){

let div=document.createElement("div")
div.className="address"

div.innerHTML=`
<input oninput="autocomplete(this)" placeholder="Digite endereço completo">
<div class="suggestions"></div>
`

document.getElementById("enderecos").appendChild(div)

}

addEndereco()
addEndereco()

async function autocomplete(input){

let box=input.parentElement.querySelector(".suggestions")

let text=input.value

if(text.length<3){

box.innerHTML=""
return

}

let url=`https://api.openrouteservice.org/geocode/autocomplete?api_key=${API_KEY}&text=${encodeURIComponent(text)}`

let res=await fetch(url)

let data=await res.json()

box.innerHTML=""

data.features.slice(0,6).forEach(place=>{

let div=document.createElement("div")

div.innerText=place.properties.label

div.onclick=()=>{

input.value=place.properties.label

input.dataset.lng=place.geometry.coordinates[0]
input.dataset.lat=place.geometry.coordinates[1]

box.innerHTML=""

}

box.appendChild(div)

})

}

async function roteirizar(){

document.getElementById("loader").style.display="block"

let inputs=document.querySelectorAll("#enderecos input")

let coords=[]
let jobs=[]

inputs.forEach((input,i)=>{

if(!input.dataset.lat) return

let lng=Number(input.dataset.lng)
let lat=Number(input.dataset.lat)

coords.push([lng,lat])

jobs.push({id:i,location:[lng,lat]})

})

if(coords.length<2){

alert("Adicione pelo menos 2 endereços válidos")

return

}

let opt=await fetch("https://api.openrouteservice.org/optimization",{

method:"POST",

headers:{
Authorization:API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
jobs:jobs,
vehicles:[{id:1,start:coords[0],end:coords[0]}]
})

})

let optData=await opt.json()

visitOrder=[]

optData.routes[0].steps.forEach(step=>{
if(step.type=="job") visitOrder.push(step.id)
})

let orderedCoords=visitOrder.map(i=>coords[i])

let route=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{

method:"POST",

headers:{
Authorization:API_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({coordinates:orderedCoords})

})

let routeData=await route.json()

totalDist=routeData.routes[0].summary.distance/1000

drawRoute(routeData.routes[0].geometry,orderedCoords)

calcValor()

document.getElementById("loader").style.display="none"

}

function drawRoute(geometry,coords){

if(routeLayer) map.removeLayer(routeLayer)

let decoded=decodePolyline(geometry)

routeLayer=L.polyline(decoded,{color:"#3b82f6",weight:5}).addTo(map)

markers.forEach(m=>map.removeLayer(m))
markers=[]

coords.forEach((c,i)=>{

let icon=L.divIcon({
className:"marker-number",
html:i+1
})

let marker=L.marker([c[1],c[0]],{icon}).addTo(map)

markers.push(marker)

})

map.fitBounds(routeLayer.getBounds())

}

function calcValor(){

let valorKm=0.85
let valor=totalDist*valorKm

let almoco=document.getElementById("almoco").checked?25.90:0

let total=valor+almoco

document.getElementById("resultado").innerHTML=`
Distância: <b>${totalDist.toFixed(2)} km</b><br>
Valor km: R$ ${valor.toFixed(2)}<br>
Total: <b>R$ ${total.toFixed(2)}</b>
`

}

function decodePolyline(str,precision){

let index=0,lat=0,lng=0,coordinates=[]
precision=Math.pow(10,precision||5)

while(index<str.length){

let b,shift=0,result=0

do{
b=str.charCodeAt(index++)-63
result|=(b&0x1f)<<shift
shift+=5
}while(b>=0x20)

let dlat=((result&1)?~(result>>1):(result>>1))
lat+=dlat

shift=0
result=0

do{
b=str.charCodeAt(index++)-63
result|=(b&0x1f)<<shift
shift+=5
}while(b>=0x20)

let dlng=((result&1)?~(result>>1):(result>>1))
lng+=dlng

coordinates.push([lat/precision,lng/precision])

}

return coordinates

}

async function exportPDF(){

const {jsPDF}=window.jspdf

let canvas=await html2canvas(document.getElementById("map"))

let img=canvas.toDataURL("image/png")

let pdf=new jsPDF()

pdf.text("ROTEIRIZADOR DE VISITAS FLUXOMED",10,10)

pdf.addImage(img,"PNG",10,20,190,100)

pdf.text("Técnico: "+document.getElementById("tecnico").value,10,130)

pdf.text("Distância: "+totalDist.toFixed(2)+" km",10,140)

pdf.save("rota_fluxomed.pdf")

}

</script>

</body>
</html>

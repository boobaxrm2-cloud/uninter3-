<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:20px;
}

#map{
height:500px;
margin-top:20px;
}

input{
display:block;
margin:5px 0;
width:300px;
padding:5px;
}

button{
margin:5px;
padding:8px 12px;
}

#resultado{
margin-top:15px;
font-size:18px;
}

</style>
</head>

<body>

<h2>Roteirizador Logístico</h2>

<div id="inputs">

<input type="text" placeholder="Endereço inicial">
<input type="text" placeholder="Parada 1">
<input type="text" placeholder="Parada 2">
<input type="text" placeholder="Destino final">

</div>

<button onclick="adicionarEndereco()">Adicionar parada</button>
<button onclick="calcularRota()">Calcular rota</button>

<div id="resultado"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

var map = L.map('map').setView([-22.90,-43.20],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let rotaLayer;

function adicionarEndereco(){

let input = document.createElement("input");
input.type="text";
input.placeholder="Nova parada";

document.getElementById("inputs").appendChild(input);

}

async function geocode(endereco){

let url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`;

let res = await fetch(url);

let data = await res.json();

if(data.length==0) throw "Endereço não encontrado";

return [
parseFloat(data[0].lon),
parseFloat(data[0].lat)
];

}

async function calcularRota(){

let inputs = document.querySelectorAll("#inputs input");

let coords=[];

for(let i of inputs){

if(i.value.trim()!=""){

let c = await geocode(i.value);

coords.push(c);

}

}

if(coords.length<2){

alert("Insira pelo menos dois endereços");

return;

}

let res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},

body:JSON.stringify({

coordinates:coords

})

});

let data = await res.json();

if(rotaLayer) map.removeLayer(rotaLayer);

rotaLayer = L.geoJSON(data).addTo(map);

map.fitBounds(rotaLayer.getBounds());

let distancia = data.features[0].properties.summary.distance / 1000;

let custo = distancia * 0.85;

document.getElementById("resultado").innerHTML=

`
Distância total: <b>${distancia.toFixed(2)} km</b><br>
Custo estimado: <b>R$ ${custo.toFixed(2)}</b>
`;

}

</script>

</body>
</html>

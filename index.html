<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ROTEIRIZADOR DE VISITAS FLUXOMED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

header{
background:#05070d;
padding:18px;
font-size:22px;
font-weight:bold;
color:#4da3ff;
letter-spacing:1px;
text-align:center;
border-bottom:1px solid #1b2a4a;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.panel{
width:420px;
background:#0e1424;
padding:20px;
overflow:auto;
border-right:1px solid #1b2a4a;
}

#map{
flex:1;
}

.input-group{
margin-bottom:12px;
position:relative;
}

input{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#111a33;
color:white;
}

button{
margin-top:10px;
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2d7cff;
color:white;
font-weight:bold;
cursor:pointer;
transition:.2s;
}

button:hover{
background:#5597ff;
transform:scale(1.02);
}

.removeBtn{
position:absolute;
right:5px;
top:5px;
background:#ff3b3b;
border:none;
padding:5px 8px;
cursor:pointer;
}

.autocomplete{
background:#0e1424;
border:1px solid #1b2a4a;
position:absolute;
width:100%;
z-index:999;
max-height:150px;
overflow:auto;
}

.autocomplete div{
padding:8px;
cursor:pointer;
}

.autocomplete div:hover{
background:#1b2a4a;
}

.loader{
display:none;
margin:20px auto;
border:5px solid #1b2a4a;
border-top:5px solid #4da3ff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
}

@keyframes spin{
0%{transform:rotate(0deg)}
100%{transform:rotate(360deg)}
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0e1424;
padding:30px;
border-radius:10px;
display:none;
border:1px solid #1b2a4a;
}

</style>
</head>

<body>

<header>ROTEIRIZADOR DE VISITAS FLUXOMED</header>

<div class="container">

<div class="panel">

<div id="inputs"></div>

<button onclick="addInput()">+ Adicionar endereço</button>
<button onclick="roteirizar()">Roteirizar Rotas</button>
<button onclick="limpar()">Limpar rota</button>
<button onclick="exportExcel()">Gerar Planilha Excel</button>

<div class="loader" id="loader"></div>

</div>

<div id="map"></div>

</div>

<div class="popup" id="popup"></div>

<script>

const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map=L.map('map').setView([-22.9,-43.2],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'OSM'
}).addTo(map);

let markers=[]
let routeLine
let rotaDados=[]

addInput()
addInput()

function addInput(){

let div=document.createElement("div")
div.className="input-group"

let input=document.createElement("input")
input.placeholder="Digite endereço"

let auto=document.createElement("div")
auto.className="autocomplete"

input.oninput=async function(){

let q=input.value
if(q.length<4) return

let url=`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${q}`

let res=await fetch(url)
let data=await res.json()

auto.innerHTML=""

data.features.slice(0,5).forEach(f=>{

let opt=document.createElement("div")
opt.innerText=f.properties.label

opt.onclick=function(){
input.value=f.properties.label
input.dataset.lng=f.geometry.coordinates[0]
input.dataset.lat=f.geometry.coordinates[1]
auto.innerHTML=""
}

auto.appendChild(opt)

})

}

let remove=document.createElement("button")
remove.innerText="X"
remove.className="removeBtn"
remove.onclick=function(){div.remove()}

div.appendChild(input)
div.appendChild(remove)
div.appendChild(auto)

document.getElementById("inputs").appendChild(div)

}

async function roteirizar(){

document.getElementById("loader").style.display="block"

let inputs=document.querySelectorAll("#inputs input")

let coords=[]

inputs.forEach(i=>{
if(i.dataset.lat){
coords.push([parseFloat(i.dataset.lng),parseFloat(i.dataset.lat)])
}
})

if(coords.length<2){
alert("Insira pelo menos dois endereços")
return
}

let body={
coordinates:coords,
instructions:false
}

let res=await fetch(
"https://api.openrouteservice.org/v2/directions/driving-car/geojson",
{
method:"POST",
headers:{
"Authorization":API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
})

let data=await res.json()

let route=data.features[0].geometry.coordinates

if(routeLine) map.removeLayer(routeLine)

routeLine=L.polyline(route.map(c=>[c[1],c[0]]),{color:"#4da3ff",weight:5}).addTo(map)

map.fitBounds(routeLine.getBounds())

let totalKm=data.features[0].properties.summary.distance/1000
let custoTotal=totalKm*0.85

rotaDados=[]
let html=""

let legs=data.features[0].properties.segments[0].steps

let acumulado=0

inputs.forEach((i,index)=>{

let dist=0

if(index>0){

dist=(data.features[0].properties.segments[0].distance/1000)/inputs.length

}

let custo=dist*0.85
acumulado+=custo

rotaDados.push({
ordem:index+1,
endereco:i.value,
km:dist.toFixed(2),
valor:custo.toFixed(2),
total:acumulado.toFixed(2)
})

html+=`<p><b>Visita ${index+1}</b><br>${i.value}<br>${dist.toFixed(2)} km | R$ ${custo.toFixed(2)}</p>`

})

html+=`<hr><b>Total:</b> ${totalKm.toFixed(2)} km<br><b>Custo:</b> R$ ${custoTotal.toFixed(2)}`

document.getElementById("popup").innerHTML=html
document.getElementById("popup").style.display="block"

document.getElementById("loader").style.display="none"

}

function limpar(){

location.reload()

}

function exportExcel(){

let ws=XLSX.utils.json_to_sheet(rotaDados)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Rota")

XLSX.writeFile(wb,"rota_fluxomed.xlsx")

}

</script>

</body>
</html>

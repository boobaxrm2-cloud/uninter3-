<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
background:#000;
font-family:Arial;
color:white;
margin:0;
}

.container{
width:420px;
position:absolute;
top:20px;
left:20px;
background:#111;
padding:20px;
border-radius:10px;
z-index:1000;
}

input,button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:5px;
}

button{
background:#2ecc71;
color:white;
font-weight:bold;
cursor:pointer;
}

#map{
height:100vh;
}

.autocomplete{
background:#222;
position:relative;
}

.suggestions{
position:absolute;
background:#333;
width:100%;
max-height:150px;
overflow-y:auto;
z-index:2000;
}

.suggestions div{
padding:8px;
cursor:pointer;
}

.suggestions div:hover{
background:#555;
}

</style>
</head>

<body>

<div class="container">

<h3>Roteirizador</h3>

<div class="autocomplete">
<input id="endereco" placeholder="Digite o endereço">
<div id="lista" class="suggestions"></div>
</div>

<button onclick="adicionarEndereco()">Adicionar endereço</button>

<div id="enderecos"></div>

<input id="valorKM" placeholder="Valor por KM (R$)" type="number">

<button onclick="calcularRota()">Calcular Rota</button>

<button onclick="abrirDespesas()">Despesas Diárias</button>

<button onclick="gerarPDF()">Baixar PDF</button>

<h3 id="resultado"></h3>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/leaflet-routing-machine@latest/dist/leaflet-routing-machine.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

let map = L.map('map').setView([-22.9,-43.2],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let enderecos=[]
let coordenadas=[]
let despesas=[]
let routingControl=null

const input=document.getElementById("endereco")
const lista=document.getElementById("lista")

input.addEventListener("input",async function(){

let q=input.value

if(q.length<3){
lista.innerHTML=""
return
}

let url=`https://nominatim.openstreetmap.org/search?format=json&q=${q}`

let res=await fetch(url)

let data=await res.json()

lista.innerHTML=""

data.forEach(l=>{

let div=document.createElement("div")

div.innerText=l.display_name

div.onclick=()=>{

input.value=l.display_name
input.dataset.lat=l.lat
input.dataset.lon=l.lon

lista.innerHTML=""

}

lista.appendChild(div)

})

})

function adicionarEndereco(){

let nome=input.value
let lat=input.dataset.lat
let lon=input.dataset.lon

if(!lat){
alert("Escolha um endereço da lista")
return
}

enderecos.push(nome)

coordenadas.push([lat,lon])

document.getElementById("enderecos").innerHTML+=`<p>${nome}</p>`

input.value=""

}

function calcularRota(){

if(routingControl){
map.removeControl(routingControl)
}

let waypoints=coordenadas.map(c=>L.latLng(c[0],c[1]))

routingControl=L.Routing.control({
waypoints:waypoints,
routeWhileDragging:false
}).addTo(map)

routingControl.on('routesfound',function(e){

let distancia=e.routes[0].summary.totalDistance/1000

let valorKM=document.getElementById("valorKM").value

let custo=distancia*valorKM

let totalDespesas=despesas.reduce((a,b)=>a+b,0)

let total=custo+totalDespesas

document.getElementById("resultado").innerHTML=

`
Distância: ${distancia.toFixed(2)} km <br>
Custo KM: R$ ${custo.toFixed(2)} <br>
Despesas: R$ ${totalDespesas.toFixed(2)} <br>
Total: R$ ${total.toFixed(2)}
`

})

}

function abrirDespesas(){

let valor=prompt("Digite valor da despesa")

if(valor){
despesas.push(Number(valor))
}

}

async function gerarPDF(){

const {jsPDF}=window.jspdf

let canvas=await html2canvas(document.getElementById("map"))

let img=canvas.toDataURL("image/png")

let pdf=new jsPDF()

pdf.text("Relatório de Rota",20,20)

let y=40

enderecos.forEach(e=>{

pdf.text(e,20,y)
y+=10

})

pdf.addImage(img,'PNG',15,80,180,100)

pdf.save("rota.pdf")

}

</script>

</body>
</html>

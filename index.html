<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Roteirizador Inteligente</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
background:#05070d;
font-family:Arial;
color:white;
overflow:hidden;
}

#map{
position:absolute;
top:0;
right:0;
width:70%;
height:100vh;
}

.panel{
position:absolute;
left:0;
top:0;
width:30%;
height:100vh;
background:#0b0f1a;
padding:25px;
overflow:auto;
box-shadow:0 0 40px #0af3;
}

h1{
color:#0af;
font-size:22px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:6px;
border:none;
background:#101726;
color:white;
}

button{
margin-top:12px;
padding:12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#0af;
color:white;
font-weight:bold;
transition:.2s;
width:100%;
}

button:hover{
background:#08c;
}

.stop{
position:relative;
margin-bottom:15px;
}

.remove{
position:absolute;
right:8px;
top:14px;
cursor:pointer;
color:red;
}

.suggestions{
background:#111;
position:absolute;
top:42px;
left:0;
width:100%;
max-height:150px;
overflow-y:auto;
border-radius:6px;
border:1px solid #0af;
z-index:9999;
}

.suggestions div{
padding:8px;
cursor:pointer;
}

.suggestions div:hover{
background:#0af;
}

#loading{
display:none;
margin-top:10px;
color:#0af;
}

.popup{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#0b0f1a;
padding:30px;
border-radius:10px;
box-shadow:0 0 30px #0af;
display:none;
max-width:400px;
}

</style>
</head>

<body>

<div class="panel">

<h1>Roteirizador Futurista</h1>

<div id="stops"></div>

<button onclick="addStop()">Adicionar endereço</button>

<button onclick="calculateRoute()">Roteirizar Rotas</button>

<button onclick="clearRoute()">Limpar rota</button>

<div id="loading">Calculando rota...</div>

</div>

<div id="map"></div>

<div id="popup" class="popup">
<h2>Resumo da Rota</h2>
<div id="summary"></div>
<button onclick="downloadExcel()">Baixar Excel</button>
<button onclick="closePopup()">Fechar</button>
</div>

<script>

const apiKey="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

let map=L.map('map').setView([-22.9,-43.2],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let routeLine=null
let routeData=[]

function addStop(){

let div=document.createElement("div")
div.className="stop"

let input=document.createElement("input")
input.placeholder="Digite um endereço"

let suggestions=document.createElement("div")
suggestions.className="suggestions"
suggestions.style.display="none"

let remove=document.createElement("span")
remove.innerHTML="✖"
remove.className="remove"

remove.onclick=()=>div.remove()

let timeout=null

input.addEventListener("input",()=>{

clearTimeout(timeout)

timeout=setTimeout(()=>searchAddress(input,suggestions),400)

})

div.appendChild(input)
div.appendChild(remove)
div.appendChild(suggestions)

document.getElementById("stops").appendChild(div)

}

async function searchAddress(input,suggestions){

let query=input.value

if(query.length<3){
suggestions.style.display="none"
return
}

let url=`https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(query)}`

let res=await fetch(url)

let data=await res.json()

suggestions.innerHTML=""

data.forEach(place=>{

let item=document.createElement("div")

item.innerText=place.display_name

item.onclick=()=>{

input.value=place.display_name
input.dataset.lat=place.lat
input.dataset.lon=place.lon

suggestions.style.display="none"

}

suggestions.appendChild(item)

})

suggestions.style.display="block"

}

addStop()
addStop()

async function calculateRoute(){

document.getElementById("loading").style.display="block"

let coords=[]
let addresses=[]

document.querySelectorAll("#stops input").forEach(i=>{

if(i.dataset.lat){

coords.push([parseFloat(i.dataset.lon),parseFloat(i.dataset.lat)])
addresses.push(i.value)

}

})

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{

method:"POST",

headers:{
"Authorization":apiKey,
"Content-Type":"application/json"
},

body:JSON.stringify({
coordinates:coords
})

})

let data=await res.json()

let route=data.routes[0]

let decoded=decodePolyline(route.geometry)

if(routeLine)map.removeLayer(routeLine)

routeLine=L.polyline(decoded,{color:"#00aaff",weight:5}).addTo(map)

map.fitBounds(routeLine.getBounds())

routeData=[]

let summaryHTML=""
let total=0

route.segments.forEach((seg,i)=>{

let km=(seg.distance/1000).toFixed(2)

let cost=(km*0.85).toFixed(2)

total+=parseFloat(cost)

routeData.push({
ordem:i+1,
endereco:addresses[i],
km:km,
valor:cost
})

summaryHTML+=`<p>${addresses[i]} → ${km} km | R$ ${cost}</p>`

})

summaryHTML+=`<h3>Total: R$ ${total.toFixed(2)}</h3>`

document.getElementById("summary").innerHTML=summaryHTML

document.getElementById("popup").style.display="block"

document.getElementById("loading").style.display="none"

}

function decodePolyline(str,precision=5){

let index=0,lng=0,lat=0,coords=[]
const factor=Math.pow(10,precision)

while(index<str.length){

let b,shift=0,result=0

do{
b=str.charCodeAt(index++)-63
result|=(b&0x1f)<<shift
shift+=5
}while(b>=0x20)

let dlat=((result&1)?~(result>>1):(result>>1))
lat+=dlat

shift=0
result=0

do{
b=str.charCodeAt(index++)-63
result|=(b&0x1f)<<shift
shift+=5
}while(b>=0x20)

let dlng=((result&1)?~(result>>1):(result>>1))
lng+=dlng

coords.push([lat/factor,lng/factor])

}

return coords

}

function clearRoute(){

if(routeLine)map.removeLayer(routeLine)

document.getElementById("stops").innerHTML=""

addStop()
addStop()

}

function closePopup(){

document.getElementById("popup").style.display="none"

}

function downloadExcel(){

let data=[["Ordem","Endereço","Km desde última visita","Valor desde último ponto","Valor total rota"]]

let total=0

routeData.forEach(r=>{

total+=parseFloat(r.valor)

data.push([r.ordem,r.endereco,r.km,r.valor,total.toFixed(2)])

})

let ws=XLSX.utils.aoa_to_sheet(data)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Rota")

XLSX.writeFile(wb,"rota.xlsx")

}

</script>

</body>
</html>

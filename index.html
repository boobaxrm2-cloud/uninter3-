<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ROTEIRIZADOR DE VISITAS FLUXOMED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://unpkg.com/leaflet-image/leaflet-image.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
overflow:hidden;
}

#map{
position:absolute;
right:0;
top:0;
width:72%;
height:100%;
}

.panel{
position:absolute;
left:0;
top:0;
width:28%;
height:100%;
background:#111827;
padding:25px;
box-shadow:5px 0 40px rgba(0,0,0,0.6);
z-index:1000;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:#38bdf8;
}

input{
width:100%;
padding:10px;
margin-top:10px;
background:#0b0f1a;
border:1px solid #1f2937;
color:white;
border-radius:8px;
}

button{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.add{background:#2563eb;color:white;}
.route{background:#22c55e;color:white;}
.delete{background:#ef4444;color:white;}
.clear{background:#f59e0b;color:white;}

.address{
margin-top:8px;
}

.switch{
margin-top:10px;
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000c;
padding:30px;
border-radius:10px;
display:none;
z-index:2000;
}

.spinner{
border:5px solid #1f2937;
border-top:5px solid #38bdf8;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.result{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:25px;
border-radius:10px;
display:none;
z-index:3000;
width:350px;
}

</style>
</head>

<body>

<div class="panel">

<div class="title">ROTEIRIZADOR DE VISITAS FLUXOMED</div>

<label>Técnico</label>
<input id="tecnico">

<div id="addresses"></div>

<button class="add" onclick="addAddress()">Adicionar endereço</button>

<button class="delete" onclick="removeAddress()">Excluir último endereço</button>

<button class="clear" onclick="clearRoutes()">Limpar rotas</button>

<div class="switch">
<input type="checkbox" id="almoco"> Incluir almoço (R$25,90)
</div>

<button class="route" onclick="calcularRota()">Roteirizar rota</button>

</div>

<div id="map"></div>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div class="result" id="resultado"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const apiKey="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

let map=L.map('map').setView([-22.9,-43.2],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let coords=[]
let markers=[]
let addresses=[]
let rotaLayer=null

function addAddress(){

let input=document.createElement("input")
input.placeholder="Digite endereço"

input.addEventListener("change",async ()=>{

let res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${input.value}`)
let data=await res.json()

if(data.length>0){

let lat=data[0].lat
let lon=data[0].lon

coords.push([lon,lat])
addresses.push(input.value)

let marker=L.marker([lat,lon]).addTo(map)

markers.push(marker)

map.setView([lat,lon],13)

}

})

document.getElementById("addresses").appendChild(input)

}

function removeAddress(){

if(markers.length==0)return

let marker=markers.pop()
map.removeLayer(marker)

coords.pop()
addresses.pop()

let list=document.getElementById("addresses")
list.removeChild(list.lastChild)

}

function clearRoutes(){

markers.forEach(m=>map.removeLayer(m))

markers=[]
coords=[]
addresses=[]

if(rotaLayer){
map.removeLayer(rotaLayer)
}

document.getElementById("addresses").innerHTML=""

}

async function calcularRota(){

if(coords.length<2){
alert("Adicione pelo menos dois endereços")
return
}

document.getElementById("loading").style.display="block"

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":apiKey
},
body:JSON.stringify({coordinates:coords})
})

let data=await res.json()

document.getElementById("loading").style.display="none"

let km=data.routes[0].summary.distance/1000

let valor=km*0.85

let almoco=document.getElementById("almoco").checked

if(almoco) valor+=25.90

let html=`
<h2>Resumo da rota</h2>
<p><b>Kilometragem:</b> ${km.toFixed(2)} km</p>
<p><b>Valor KM:</b> R$0,85</p>
<p><b>Total:</b> R$${valor.toFixed(2)}</p>

<button onclick="baixarPDF(${km},${valor})">Baixar PDF</button>

<button onclick="fechar()">Fechar</button>
`

document.getElementById("resultado").innerHTML=html
document.getElementById("resultado").style.display="block"

let geo=data.routes[0].geometry

if(rotaLayer) map.removeLayer(rotaLayer)

rotaLayer=L.geoJSON(geo,{
style:{color:"#22c55e",weight:5}
}).addTo(map)

}

function fechar(){
document.getElementById("resultado").style.display="none"
}

function baixarPDF(km,total){

leafletImage(map,function(err,canvas){

let img=canvas.toDataURL("image/png")

const {jsPDF}=window.jspdf

let pdf=new jsPDF()

let tecnico=document.getElementById("tecnico").value

pdf.text("ROTEIRIZADOR DE VISITAS FLUXOMED",10,10)

pdf.text("Técnico: "+tecnico,10,20)

pdf.text("Endereços:",10,30)

let y=40

addresses.forEach((a,i)=>{

pdf.text((i+1)+" - "+a,10,y)
y+=8

})

pdf.text("Distância total: "+km.toFixed(2)+" km",10,y+10)

pdf.text("Valor total: R$"+total.toFixed(2),10,y+18)

pdf.addImage(img,"PNG",10,y+25,180,90)

pdf.save("rota_fluxomed.pdf")

})

}

addAddress()
addAddress()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ROTEIRIZADOR DE VISITAS FLUXOMED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
overflow:hidden;
}

#map{
position:absolute;
right:0;
top:0;
width:72%;
height:100%;
}

.panel{
position:absolute;
left:0;
top:0;
width:28%;
height:100%;
background:#111827;
padding:25px;
box-shadow:5px 0 40px rgba(0,0,0,0.6);
z-index:1000;
border-right:2px solid transparent;
background-image:linear-gradient(#111827,#111827),
linear-gradient(180deg,#1d4ed8,#38bdf8);
background-origin:border-box;
background-clip:padding-box,border-box;
}

.title{
font-size:22px;
font-weight:bold;
margin-bottom:20px;
color:#38bdf8;
}

input{
width:100%;
padding:12px;
margin-top:10px;
background:#0b0f1a;
border:1px solid #1f2937;
color:white;
border-radius:8px;
}

button{
width:100%;
padding:12px;
margin-top:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.add{
background:#1d4ed8;
color:white;
}

.route{
background:#22c55e;
color:white;
}

.delete{
background:#ef4444;
color:white;
}

.address{
margin-top:10px;
}

.switch{
display:flex;
align-items:center;
margin-top:15px;
}

.switch input{
width:20px;
margin-right:10px;
}

.loading{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#000000c9;
padding:40px;
border-radius:10px;
display:none;
z-index:2000;
}

.spinner{
border:5px solid #1f2937;
border-top:5px solid #38bdf8;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.result{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111827;
padding:30px;
border-radius:10px;
box-shadow:0 0 30px rgba(0,0,0,0.7);
display:none;
z-index:3000;
text-align:center;
}

.autocomplete{
position:relative;
}

.suggestions{
position:absolute;
background:#1f2937;
width:100%;
max-height:150px;
overflow:auto;
border-radius:5px;
z-index:2000;
}

.suggestions div{
padding:10px;
cursor:pointer;
}

.suggestions div:hover{
background:#374151;
}

</style>
</head>

<body>

<div class="panel">

<div class="title">ROTEIRIZADOR DE VISITAS FLUXOMED</div>

<label>Técnico</label>
<input id="tecnico" placeholder="Nome do técnico">

<div id="addresses"></div>

<button class="add" onclick="addAddress()">Adicionar endereço</button>

<button class="delete" onclick="removeAddress()">Excluir último endereço</button>

<div class="switch">
<input type="checkbox" id="almoco">
<label>Incluir almoço (R$25,90)</label>
</div>

<button class="route" onclick="calcularRota()">Roteirizar rota</button>

</div>

<div id="map"></div>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div class="result" id="resultado"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const apiKey="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

let map=L.map('map').setView([-22.9,-43.2],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let markers=[]
let coords=[]
let rotaLayer

function addAddress(){

let div=document.createElement("div")
div.className="address autocomplete"

div.innerHTML=`
<input placeholder="Digite endereço">
<div class="suggestions"></div>
`

document.getElementById("addresses").appendChild(div)

let input=div.querySelector("input")
let suggestions=div.querySelector(".suggestions")

input.addEventListener("input",async ()=>{

let q=input.value

if(q.length<3) return

let res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${q}`)
let data=await res.json()

suggestions.innerHTML=""

data.slice(0,5).forEach(place=>{

let item=document.createElement("div")
item.innerText=place.display_name

item.onclick=()=>{

input.value=place.display_name

coords.push([place.lon,place.lat])

let marker=L.marker([place.lat,place.lon]).addTo(map)

markers.push(marker)

map.setView([place.lat,place.lon],13)

suggestions.innerHTML=""

}

suggestions.appendChild(item)

})

})

}

function removeAddress(){

let list=document.getElementById("addresses")

if(list.lastChild){
list.removeChild(list.lastChild)
}

}

async function calcularRota(){

if(coords.length<2){
alert("Adicione pelo menos dois endereços")
return
}

document.getElementById("loading").style.display="block"

let body={
coordinates:coords
}

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":apiKey
},
body:JSON.stringify(body)
})

let data=await res.json()

document.getElementById("loading").style.display="none"

let km=data.routes[0].summary.distance/1000

let valor=km*0.85

let almoco=document.getElementById("almoco").checked

if(almoco){
valor+=25.90
}

let resultado=`
<h2>Resultado da Rota</h2>
<p>Kilometragem: ${km.toFixed(2)} km</p>
<p>Valor KM: R$0,85</p>
<p>Almoço: ${almoco?"R$25,90":"Não incluído"}</p>
<h3>Total: R$${valor.toFixed(2)}</h3>
<button onclick="fechar()">Fechar</button>
`

document.getElementById("resultado").innerHTML=resultado
document.getElementById("resultado").style.display="block"

let geo=data.routes[0].geometry

if(rotaLayer){
map.removeLayer(rotaLayer)
}

rotaLayer=L.geoJSON(geo,{
style:{color:"#22c55e",weight:5}
}).addTo(map)

}

function fechar(){
document.getElementById("resultado").style.display="none"
}

addAddress()
addAddress()

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mariana Feiosa</title>
    <meta name="description" content="Uma tela estática fofinha com tema de gatinhos e stickers de gato." />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <div class="sparkles">✨</div>
      <h1>mariana feiosa</h1>
      <p>gatinho fofo, carinho e muita fofura 💖🐱</p>
      <div class="emoji-row" aria-label="gatinhos fofinhos">
        <span>🐱</span>
        <span>😺</span>
        <span>🐈</span>
        <span>😸</span>
        <span>💗</span>
      </div>
      <div class="sticker-area">
        <div class="sticker">🐾</div>
        <div class="sticker">🧡</div>
        <div class="sticker">😻</div>
        <div class="sticker">☁️</div>
      </div>
    </main>
  </body>
</html>

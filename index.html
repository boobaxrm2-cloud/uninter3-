<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
background:#000;
font-family:Arial;
color:white;
margin:0;
}

.container{
width:420px;
position:absolute;
top:20px;
left:20px;
background:#111;
padding:20px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,150,255,0.4);
z-index:999;
}

h2{
margin-top:0;
}

.input-group{
display:flex;
align-items:center;
margin-bottom:8px;
position:relative;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:none;
background:linear-gradient(145deg,#1a2f4a,#0a1f35);
color:white;
}

.trash{
margin-left:6px;
cursor:pointer;
color:#ff5c5c;
font-size:18px;
}

button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
background:#0078ff;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00a2ff;
}

#map{
height:100vh;
}

.suggestions{
position:absolute;
top:40px;
left:0;
right:25px;
background:#0b1a2b;
border-radius:6px;
overflow:hidden;
max-height:150px;
overflow-y:auto;
z-index:1000;
}

.suggestion{
padding:8px;
cursor:pointer;
}

.suggestion:hover{
background:#0078ff;
}

.loading{
display:none;
text-align:center;
margin-top:10px;
}

.spinner{
border:4px solid #222;
border-top:4px solid #00a2ff;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<h2>Roteirizador</h2>

<div id="inputs"></div>

<button onclick="addInput()">+ Adicionar parada</button>

<button onclick="calculateRoute()">Roteirizar Melhor Rota</button>

<button onclick="downloadExcel()">Baixar Excel</button>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div id="result"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const apiKey="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map=L.map('map').setView([-22.9,-43.2],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let routeLayer;
let routeData=[];

function addInput(){

let div=document.createElement("div");
div.className="input-group";

div.innerHTML=`
<input type="text" oninput="autocomplete(this)" placeholder="Digite endereço">
<span class="trash" onclick="removeInput(this)">🗑</span>
<div class="suggestions"></div>
`;

document.getElementById("inputs").appendChild(div);

}

function removeInput(el){
el.parentElement.remove();
}

addInput();
addInput();

async function autocomplete(input){

let query=input.value;

if(query.length<3) return;

let url=`https://api.openrouteservice.org/geocode/autocomplete?api_key=${apiKey}&text=${query}`;

let res=await fetch(url);
let data=await res.json();

let box=input.parentElement.querySelector(".suggestions");
box.innerHTML="";

data.features.forEach(f=>{

let div=document.createElement("div");
div.className="suggestion";
div.innerText=f.properties.label;

div.onclick=()=>{

input.value=f.properties.label;
input.dataset.lng=f.geometry.coordinates[0];
input.dataset.lat=f.geometry.coordinates[1];

box.innerHTML="";

};

box.appendChild(div);

});

}

async function calculateRoute(){

document.getElementById("loading").style.display="block";

let inputs=document.querySelectorAll("#inputs input");

let coords=[];

for(let i of inputs){

if(!i.dataset.lat){
alert("Selecione os endereços na lista de sugestões.");
document.getElementById("loading").style.display="none";
return;
}

coords.push([
parseFloat(i.dataset.lng),
parseFloat(i.dataset.lat)
]);

}

let body={
coordinates:coords
};

try{

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
"Authorization":apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
});

let data=await res.json();

let geometry=data.routes[0].geometry;

document.getElementById("loading").style.display="none";

if(routeLayer) map.removeLayer(routeLayer);

routeLayer=L.geoJSON({
"type":"Feature",
"geometry":geometry
},{
style:{color:"#00a2ff",weight:5}
}).addTo(map);

map.fitBounds(routeLayer.getBounds());

let distance=data.routes[0].summary.distance/1000;

let resultHTML=`<p><b>Distância Total:</b> ${distance.toFixed(2)} km</p>`;

routeData=[];

inputs.forEach((input,i)=>{

let km = i==0 ? 0 : distance/(inputs.length-1);
let cost = km*0.85;

routeData.push({
ordem:i+1,
endereco:input.value,
dist:km,
cost:cost
});

resultHTML+=`
<p>
${i+1} - ${input.value}<br>
Distância estimada: ${km.toFixed(2)} km<br>
Custo estimado: R$ ${cost.toFixed(2)}
</p>
`;

});

document.getElementById("result").innerHTML=resultHTML;

}catch(e){

document.getElementById("loading").style.display="none";
alert("Erro ao calcular rota.");

}

}

function downloadExcel(){

let csv="Ordem,Endereço,Distancia (km),Custo (R$)\n";

routeData.forEach(r=>{
csv+=`${r.ordem},"${r.endereco}",${r.dist.toFixed(2)},${r.cost.toFixed(2)}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);
a.download="rota.csv";
a.click();

}

</script>

</body>
</html>

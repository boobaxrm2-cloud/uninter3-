<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">
<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#f5f6fa;
}

#sidebar{
width:380px;
background:white;
padding:20px;
overflow:auto;
box-shadow:2px 0 8px rgba(0,0,0,0.1);
}

#map{
flex:1;
}

h2{
margin-top:0;
}

input{
width:100%;
padding:8px;
margin-bottom:5px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px;
border:none;
border-radius:6px;
margin-top:5px;
cursor:pointer;
font-weight:bold;
}

.btn-main{
background:black;
color:white;
}

.btn-secondary{
background:#e4e6eb;
}

.suggestions{
background:white;
border:1px solid #ccc;
max-height:120px;
overflow:auto;
position:relative;
z-index:1000;
}

.suggestions div{
padding:5px;
cursor:pointer;
}

.suggestions div:hover{
background:#eee;
}

#resultado{
margin-top:10px;
font-size:16px;
}

#loading{
display:none;
text-align:center;
margin-top:10px;
}

.spinner{
border:6px solid #f3f3f3;
border-top:6px solid black;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

.parada{
margin-bottom:10px;
}

</style>
</head>

<body>

<div id="sidebar">

<h2>Roteirizador</h2>

<div id="inputs"></div>

<button class="btn-secondary" onclick="addInput()">+ Adicionar parada</button>

<button class="btn-main" onclick="calcularRota()">Calcular rota</button>

<button class="btn-secondary" onclick="limparRota()">Excluir rota</button>

<button class="btn-secondary" onclick="baixarExcel()">Baixar Excel</button>

<div id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div id="resultado"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map=L.map('map').setView([-22.9,-43.2],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let rotaLayer;
let markers=[];
let rotaDados=[];

function addInput(){

let div=document.createElement("div");
div.className="parada";

let input=document.createElement("input");
input.placeholder="Digite endereço";

let sug=document.createElement("div");
sug.className="suggestions";

input.addEventListener("input",async function(){

if(input.value.length<3){
sug.innerHTML="";
return;
}

let url=`https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(input.value)}`;

let res=await fetch(url);
let data=await res.json();

sug.innerHTML="";

data.forEach(p=>{

let item=document.createElement("div");

item.textContent=p.display_name;

item.onclick=function(){

input.value=p.display_name;
input.dataset.lat=p.lat;
input.dataset.lon=p.lon;

sug.innerHTML="";

};

sug.appendChild(item);

});

});

div.appendChild(input);
div.appendChild(sug);

document.getElementById("inputs").appendChild(div);

}

addInput();
addInput();

async function calcularRota(){

document.getElementById("loading").style.display="block";

let inputs=document.querySelectorAll("#inputs input");

let coords=[];
let enderecos=[];

inputs.forEach(i=>{

if(i.dataset.lon){

coords.push([parseFloat(i.dataset.lon),parseFloat(i.dataset.lat)]);
enderecos.push(i.value);

}

});

if(coords.length<2){

alert("Digite ao menos 2 endereços");
document.getElementById("loading").style.display="none";
return;

}

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},

body:JSON.stringify({coordinates:coords})

});

let data=await res.json();

if(rotaLayer) map.removeLayer(rotaLayer);

rotaLayer=L.geoJSON(data).addTo(map);

map.fitBounds(rotaLayer.getBounds());

markers.forEach(m=>map.removeLayer(m));
markers=[];

coords.forEach((c,i)=>{

let m=L.marker([c[1],c[0]]).addTo(map).bindPopup(enderecos[i]);

markers.push(m);

});

let distancia=data.features[0].properties.summary.distance/1000;

let custo=distancia*0.85;

document.getElementById("resultado").innerHTML=
`Distância total: <b>${distancia.toFixed(2)} km</b><br>
Custo estimado: <b>R$ ${custo.toFixed(2)}</b>`;

rotaDados=[];

for(let i=0;i<enderecos.length;i++){

rotaDados.push({
Ordem:i+1,
Endereco:enderecos[i]
});

}

document.getElementById("loading").style.display="none";

}

function limparRota(){

if(rotaLayer) map.removeLayer(rotaLayer);

markers.forEach(m=>map.removeLayer(m));

markers=[];
rotaDados=[];

document.getElementById("resultado").innerHTML="";

}

function baixarExcel(){

if(rotaDados.length==0){

alert("Calcule uma rota primeiro");
return;

}

let ws=XLSX.utils.json_to_sheet(rotaDados);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Rota");

XLSX.writeFile(wb,"rota_entregas.xlsx");

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Para Raissa ❤️</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#ff7eb3,#ff758c,#ff9a9e);
color:white;
text-align:center;
overflow-x:hidden;
}

/* CORAÇÕES */

.hearts{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
pointer-events:none;
overflow:hidden;
}

.heart{
position:absolute;
bottom:-50px;
font-size:20px;
animation:float 8s linear infinite;
opacity:0.7;
}

@keyframes float{
0%{transform:translateY(0) scale(1);opacity:0;}
10%{opacity:1;}
100%{transform:translateY(-110vh) scale(1.5);opacity:0;}
}

/* TITULOS */

h1{
margin-top:40px;
font-size:40px;
}

.counter{
font-size:26px;
margin-top:10px;
font-weight:bold;
}

.sub{
margin-bottom:30px;
font-size:18px;
opacity:0.9;
}

/* BOTÕES */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(70px,1fr));
gap:10px;
padding:30px;
max-width:1200px;
margin:auto;
}

button{
background:white;
color:#ff4b7d;
border:none;
border-radius:12px;
padding:10px;
font-weight:bold;
cursor:pointer;
transition:0.2s;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

button:hover{
transform:scale(1.1);
background:#ffe6ef;
}

/* POPUP */

.popup-bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
align-items:center;
justify-content:center;
}

.popup{
background:white;
color:#333;
padding:40px;
border-radius:20px;
max-width:400px;
font-size:20px;
animation:fade 0.3s;
}

.close{
margin-top:20px;
background:#ff4b7d;
color:white;
padding:10px 20px;
border-radius:10px;
border:none;
cursor:pointer;
}

@keyframes fade{
from{transform:scale(0.7);opacity:0;}
to{transform:scale(1);opacity:1;}
}

</style>
</head>

<body>

<div class="hearts" id="hearts"></div>

<h1>💖 Jonas & Raissa 💖</h1>

<div class="counter">
Estamos juntos há <span id="dias"></span> dias ❤️
</div>

<div class="sub">
Cada botão representa um dia do nosso amor.
Clique e descubra um motivo pelo qual Jonas ama você.
</div>

<div class="grid" id="grid"></div>

<div class="popup-bg" id="popupbg">
<div class="popup">
<div id="mensagem"></div>
<br>
<button class="close" onclick="fechar()">Fechar ❤️</button>
</div>
</div>

<script>

/* CONTADOR DE DIAS */

const inicio = new Date("2018-01-01")
const hoje = new Date()

const diff = hoje - inicio

const dias = Math.floor(diff / (1000 * 60 * 60 * 24))

document.getElementById("dias").innerText = dias

/* FRASES */

const frases = [

"Eu te amo porque seu sorriso ilumina meus dias.",
"Eu te amo porque você faz minha vida mais feliz.",
"Eu te amo porque ao seu lado tudo fica melhor.",
"Eu te amo porque você é minha melhor amiga.",
"Eu te amo porque seu abraço é meu lugar favorito.",
"Eu te amo porque você é linda por dentro e por fora.",
"Eu te amo porque você transforma dias comuns em especiais.",
"Eu te amo porque você me faz querer ser uma pessoa melhor.",
"Eu te amo porque sua voz acalma meu coração.",
"Eu te amo porque cada momento com você vale a pena.",

"Eu te amo porque você é única no mundo.",
"Eu te amo porque Deus colocou você na minha vida.",
"Eu te amo porque você acredita em mim.",
"Eu te amo porque você me faz rir.",
"Eu te amo porque sua presença me traz paz.",
"Eu te amo porque você é carinhosa.",
"Eu te amo porque você é forte.",
"Eu te amo porque você é incrível.",
"Eu te amo porque você me entende.",
"Eu te amo porque você é especial.",

"Eu te amo porque você é a mulher da minha vida.",
"Eu te amo porque você me faz sentir completo.",
"Eu te amo porque você é meu sonho realizado.",
"Eu te amo porque cada dia ao seu lado é um presente.",
"Eu te amo porque você é maravilhosa.",
"Eu te amo porque sua risada é perfeita.",
"Eu te amo porque sua companhia é tudo que eu preciso.",
"Eu te amo porque você é meu porto seguro.",
"Eu te amo porque você é minha felicidade.",
"Eu te amo porque você é minha Raissa. ❤️"

]

function gerarFrase(){

let f = frases[Math.floor(Math.random()*frases.length)]

return f + "<br><br><b>Com amor, Jonas ❤️</b>"

}

function abrir(){

document.getElementById("mensagem").innerHTML = gerarFrase()
document.getElementById("popupbg").style.display="flex"

}

function fechar(){

document.getElementById("popupbg").style.display="none"

}

/* BOTÕES DOS DIAS */

const grid = document.getElementById("grid")

for(let i=1;i<=2993;i++){

let b = document.createElement("button")

b.innerText=i

b.onclick=abrir

grid.appendChild(b)

}

/* CORAÇÕES */

function criarCoracao(){

const heart = document.createElement("div")

heart.classList.add("heart")

heart.innerHTML="❤️"

heart.style.left = Math.random()*100 + "vw"

heart.style.fontSize = (15 + Math.random()*30) + "px"

heart.style.animationDuration = (6 + Math.random()*6) + "s"

document.getElementById("hearts").appendChild(heart)

setTimeout(()=>{
heart.remove()
},12000)

}

setInterval(criarCoracao,300)

</script>

</body>
</html>

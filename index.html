<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Planejador de Rotas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#1f1f1f;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

#controls{
background:white;
padding:15px;
display:flex;
flex-direction:column;
gap:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.2);
}

.parada{
display:flex;
gap:10px;
}

input{
flex:1;
padding:10px;
font-size:15px;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px;
font-size:14px;
border:none;
border-radius:5px;
background:#2c7be5;
color:white;
cursor:pointer;
}

button:hover{
background:#1a5ec8;
}

#map{
height:60vh;
}

#resultado{
background:white;
padding:15px;
}

</style>
</head>

<body>

<header>
Planejador de Rotas
</header>

<div id="controls">

<div id="enderecos"></div>

<button onclick="addEndereco()">+ Adicionar parada</button>

<button onclick="calcularRota()">Calcular rota</button>

</div>

<div id="map"></div>

<div id="resultado"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

const CUSTO_KM = 0.85;

let map = L.map('map').setView([-22.9068,-43.1729],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let rotaLayer;

function addEndereco(){

let div=document.createElement("div");
div.className="parada";

div.innerHTML=`<input placeholder="Digite um endereço">`;

document.getElementById("enderecos").appendChild(div);

}

addEndereco();
addEndereco();

async function geocode(endereco){

let url=`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(endereco)}`;

let res=await fetch(url);
let data=await res.json();

return data.features[0].geometry.coordinates;

}

async function calcularRota(){

let inputs=document.querySelectorAll("#enderecos input");

let coords=[];

for(let input of inputs){

if(input.value==="") continue;

let c=await geocode(input.value);

coords.push(c);

}

if(coords.length<2){

alert("Digite pelo menos dois endereços");

return;

}

let body={coordinates:coords};

let response=await fetch(
"https://api.openrouteservice.org/v2/directions/driving-car/geojson",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},
body:JSON.stringify(body)
});

let data=await response.json();

if(rotaLayer) map.removeLayer(rotaLayer);

rotaLayer=L.geoJSON(data).addTo(map);

map.fitBounds(rotaLayer.getBounds());

mostrarResultados(data);

}

function mostrarResultados(data){

let html="<h3>Resumo da rota</h3>";

let totalKm=0;
let totalCusto=0;

data.features[0].properties.segments.forEach((seg,i)=>{

let km=seg.distance/1000;

let custo=km*CUSTO_KM;

totalKm+=km;
totalCusto+=custo;

html+=`
<p>
Trecho ${i+1}<br>
Distância: ${km.toFixed(2)} km<br>
Custo gasolina: R$ ${custo.toFixed(2)}
</p>
`;

});

html+=`<hr>
<b>Total KM:</b> ${totalKm.toFixed(2)} km<br>
<b>Total combustível:</b> R$ ${totalCusto.toFixed(2)}
`;

document.getElementById("resultado").innerHTML=html;

}

</script>

</body>
</html>

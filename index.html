<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Roteirizador Inteligente</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#map{
height:100vh;
}

.painel{

position:absolute;
top:20px;
left:20px;
width:360px;

background:#1c1c1c;
padding:20px;
border-radius:10px;

z-index:1000;

}

.resultado{

position:absolute;
top:20px;
right:20px;

background:#1c1c1c;
padding:20px;
border-radius:10px;
width:300px;
max-height:85vh;
overflow:auto;

}

input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-top:5px;
}

button{

margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;

}

.add{background:#2ecc71;color:white}
.rota{background:#3498db;color:white}
.popup{background:#9b59b6;color:white}
.excel{background:#f39c12;color:white}

.listaItem{

background:#2a2a2a;
padding:6px;
margin-top:6px;
border-radius:6px;
font-size:13px;
display:flex;
justify-content:space-between;
align-items:center;

}

.lixeira{

background:#e74c3c;
color:white;
border:none;
border-radius:4px;
padding:3px 6px;
cursor:pointer;

}

.sugestoes{

background:white;
color:black;
max-height:150px;
overflow:auto;
border-radius:6px;

}

.itemSugestao{
padding:8px;
cursor:pointer;
}

.itemSugestao:hover{
background:#eee;
}

.loading{

display:none;
margin-top:10px;
text-align:center;

}

.spinner{

border:4px solid #444;
border-top:4px solid #2ecc71;
border-radius:50%;
width:30px;
height:30px;
animation:girar 1s linear infinite;
margin:auto;

}

@keyframes girar{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

.segmento{
margin-top:6px;
font-size:13px;
}

.total{
margin-top:10px;
font-weight:bold;
color:#2ecc71;
}

</style>

</head>

<body>

<div class="painel">

<h3>Adicionar endereço</h3>

<input id="endereco" placeholder="Digite o endereço">

<div id="sugestoes" class="sugestoes"></div>

<button class="add" onclick="adicionarEndereco()">Adicionar endereço</button>

<button class="rota" onclick="gerarRota()">Gerar rota otimizada</button>

<button class="popup" onclick="mostrarPopup()">Visualizar rota</button>

<button class="excel" onclick="baixarExcel()">Baixar Excel</button>

<div class="loading" id="loading">

<div class="spinner"></div>
Calculando rota...

</div>

<div id="lista"></div>

</div>

<div class="resultado">

<h3>Resumo da rota</h3>

<div id="detalhes"></div>

<div class="total" id="total"></div>

</div>

<div id="map"></div>

<script>

const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

var map=L.map('map').setView([-22.9,-43.2],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map)

let pontos=[]
let marcadores=[]
let enderecos=[]
let rota=null
let enderecoSelecionado=null
let dadosRota=[]

const input=document.getElementById("endereco")
const sugestoes=document.getElementById("sugestoes")

input.addEventListener("input",function(){

let valor=this.value

if(valor.length<3){
sugestoes.innerHTML=""
return
}

fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${valor}`)

.then(r=>r.json())

.then(data=>{

sugestoes.innerHTML=""

data.slice(0,5).forEach(local=>{

let div=document.createElement("div")

div.className="itemSugestao"

div.innerText=local.display_name

div.onclick=function(){

enderecoSelecionado=local
input.value=local.display_name
sugestoes.innerHTML=""

}

sugestoes.appendChild(div)

})

})

})

function adicionarEndereco(){

if(!enderecoSelecionado){
alert("Selecione um endereço da lista")
return
}

let lat=parseFloat(enderecoSelecionado.lat)
let lon=parseFloat(enderecoSelecionado.lon)

let marker=L.marker([lat,lon],{draggable:true}).addTo(map)

marker.bindPopup(enderecoSelecionado.display_name)

marker.on("dragend",function(){

let pos=marker.getLatLng()
pontos[marcadores.indexOf(marker)]=[pos.lng,pos.lat]

})

marcadores.push(marker)
pontos.push([lon,lat])
enderecos.push(enderecoSelecionado.display_name)

atualizarLista()

map.setView([lat,lon],14)

input.value=""
enderecoSelecionado=null

}

function atualizarLista(){

let lista=document.getElementById("lista")

lista.innerHTML=""

enderecos.forEach((end,i)=>{

let div=document.createElement("div")

div.className="listaItem"

div.innerHTML=end+
` <button class="lixeira" onclick="remover(${i})">🗑</button>`

lista.appendChild(div)

})

}

function remover(i){

map.removeLayer(marcadores[i])

marcadores.splice(i,1)
pontos.splice(i,1)
enderecos.splice(i,1)

atualizarLista()

}

function gerarRota(){

if(pontos.length<2){
alert("Adicione pelo menos 2 endereços")
return
}

document.getElementById("loading").style.display="block"

if(rota){
map.removeLayer(rota)
}

fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},

body:JSON.stringify({
coordinates:pontos,
optimize_waypoints:true
})

})

.then(r=>r.json())

.then(data=>{

document.getElementById("loading").style.display="none"

let coords=data.features[0].geometry.coordinates

let latlngs=coords.map(c=>[c[1],c[0]])

rota=L.polyline(latlngs,{
color:"cyan",
weight:5
}).addTo(map)

map.fitBounds(rota.getBounds())

calcularDistancias(data)

})

}

function calcularDistancias(data){

dadosRota=[]

let segmentos=data.features[0].properties.segments

let totalKm=0

let detalhes=document.getElementById("detalhes")

detalhes.innerHTML=""

segmentos.forEach((seg,i)=>{

let km=seg.distance/1000
let valor=km*0.85

totalKm+=km

dadosRota.push({

ordem:i+1,
endereco:enderecos[i],
km:km,
valor:valor

})

let div=document.createElement("div")

div.className="segmento"

div.innerHTML=`Visita ${i+1} → ${km.toFixed(2)} km | R$ ${valor.toFixed(2)}`

detalhes.appendChild(div)

})

let totalValor=totalKm*0.85

document.getElementById("total").innerHTML=

`Distância total: ${totalKm.toFixed(2)} km<br>
Custo total: R$ ${totalValor.toFixed(2)}`

}

function mostrarPopup(){

if(dadosRota.length==0){
alert("Calcule a rota primeiro")
return
}

let texto="ROTA OTIMIZADA\n\n"

dadosRota.forEach(d=>{

texto+=`Visita ${d.ordem}
${d.endereco}
Distância: ${d.km.toFixed(2)} km
Valor: R$ ${d.valor.toFixed(2)}

`

})

let popup=window.open("","rota","width=400,height=500")

popup.document.write(`<pre>${texto}</pre>`)

}

function baixarExcel(){

if(dadosRota.length==0){
alert("Calcule a rota primeiro")
return
}

let total=0

let planilha=dadosRota.map(d=>{

total+=d.valor

return{

"Ordem da visita":d.ordem,
"Endereço da visita":d.endereco,
"Distância do último ponto (km)":d.km.toFixed(2),
"Valor do trecho (R$)":d.valor.toFixed(2)

}

})

planilha.push({

"Ordem da visita":"",
"Endereço da visita":"TOTAL",
"Distância do último ponto (km)":"",
"Valor do trecho (R$)":total.toFixed(2)

})

let ws=XLSX.utils.json_to_sheet(planilha)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Rota")

XLSX.writeFile(wb,"rota_visitas.xlsx")

}

</script>

</body>
</html>

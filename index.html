<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Roteirizador de Visitas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

.container{
display:flex;
height:100vh;
}

#map{
flex:2;
}

.painel{
flex:1;
background:#111;
padding:20px;
overflow:auto;
}

input{
width:70%;
padding:8px;
margin:5px 0;
}

button{
padding:8px;
margin:5px;
cursor:pointer;
}

.endereco{
display:flex;
align-items:center;
gap:5px;
}

.lixeira{
background:red;
color:white;
border:none;
}

#loading{
display:none;
font-size:18px;
}

.resultado{
margin-top:20px;
background:#222;
padding:10px;
}

.autocomplete{
background:#222;
position:absolute;
z-index:999;
}

.autocomplete div{
padding:5px;
cursor:pointer;
}

.autocomplete div:hover{
background:#444;
}

</style>

</head>

<body>

<div class="container">

<div id="map"></div>

<div class="painel">

<h2>Roteirizador</h2>

<div id="enderecos"></div>

<button onclick="addEndereco()">Adicionar outra rota</button>

<br><br>

<button onclick="gerarRota()">Gerar Rota</button>

<div id="loading">Calculando rota...</div>

<div class="resultado" id="resultado"></div>

</div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const apiKey = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map = L.map('map').setView([-22.90,-43.20],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let marcadores = [];
let coords = [];
let rotaLayer;
let labels = [];

function addEndereco(){

let div = document.createElement("div");
div.className="endereco";

div.innerHTML = `
<input type="text" placeholder="Digite o endereço" oninput="buscarEndereco(this)">
<button class="lixeira" onclick="removerEndereco(this)">🗑</button>
<div class="autocomplete"></div>
`;

document.getElementById("enderecos").appendChild(div);

}

function removerEndereco(btn){

let div = btn.parentNode;
div.remove();

}

async function buscarEndereco(input){

let query = input.value;

if(query.length < 3) return;

let url = `https://api.openrouteservice.org/geocode/autocomplete?api_key=${apiKey}&text=${query}`;

let res = await fetch(url);
let data = await res.json();

let lista = input.parentNode.querySelector(".autocomplete");

lista.innerHTML="";

data.features.forEach(lugar=>{

let item = document.createElement("div");

item.innerText = lugar.properties.label;

item.onclick = ()=>{

input.value = lugar.properties.label;

let lon = lugar.geometry.coordinates[0];
let lat = lugar.geometry.coordinates[1];

adicionarMarcador(lat,lon);

lista.innerHTML="";

};

lista.appendChild(item);

});

}

function adicionarMarcador(lat,lon){

let marker = L.marker([lat,lon],{draggable:true}).addTo(map);

marker.on("dragend", atualizarCoords);

marcadores.push(marker);

coords.push([lon,lat]);

}

function atualizarCoords(){

coords=[];

marcadores.forEach(m=>{

let latlng = m.getLatLng();

coords.push([latlng.lng,latlng.lat]);

});

}

async function gerarRota(){

if(coords.length < 2){
alert("Adicione ao menos 2 endereços");
return;
}

document.getElementById("loading").style.display="block";

let body = {
coordinates: coords
};

let res = await fetch(
"https://api.openrouteservice.org/v2/directions/driving-car/geojson",
{
method:"POST",
headers:{
"Authorization":apiKey,
"Content-Type":"application/json"
},
body: JSON.stringify(body)
});

let data = await res.json();

document.getElementById("loading").style.display="none";

if(rotaLayer) map.removeLayer(rotaLayer);
labels.forEach(l=>map.removeLayer(l));
labels=[];

rotaLayer = L.geoJSON(data).addTo(map);

let coordsRota = data.features[0].geometry.coordinates;

let totalDist = data.features[0].properties.summary.distance/1000;

let texto="";

for(let i=0;i<coordsRota.length-1;i+=20){

let p1 = coordsRota[i];
let p2 = coordsRota[i+20];

if(!p2) continue;

let dist = map.distance(
[p1[1],p1[0]],
[p2[1],p2[0]]
)/1000;

let meio = [
(p1[1]+p2[1])/2,
(p1[0]+p2[0])/2
];

let label = L.marker(meio,{
icon:L.divIcon({
className:"",
html:`<div style="background:#000;padding:4px;border-radius:5px;color:#0f0">${dist.toFixed(2)} km</div>`
})
}).addTo(map);

labels.push(label);

}

let valor = totalDist * 0.85;

texto += `<b>Total KM:</b> ${totalDist.toFixed(2)} km<br>`;
texto += `<b>Valor estimado:</b> R$ ${valor.toFixed(2)}`;

document.getElementById("resultado").innerHTML = texto;

}

addEndereco();

</script>

</body>
</html>

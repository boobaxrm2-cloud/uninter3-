<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Roteirizador Inteligente</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#map{
height:100vh;
}

.painel{

position:absolute;
top:20px;
left:20px;
width:360px;
background:#1c1c1c;
padding:20px;
border-radius:10px;
z-index:1000;

}

.resultado{

position:absolute;
top:20px;
right:20px;
background:#1c1c1c;
padding:20px;
border-radius:10px;
width:300px;
max-height:85vh;
overflow:auto;

}

input{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-top:5px;
}

button{

margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
cursor:pointer;
width:100%;

}

.add{background:#2ecc71;color:white}
.rota{background:#3498db;color:white}
.pdf{background:#9b59b6;color:white}
.excel{background:#f39c12;color:white}
.limpar{background:#e74c3c;color:white}
.despesa{background:#e67e22;color:white}

.listaItem{

background:#2a2a2a;
padding:6px;
margin-top:6px;
border-radius:6px;
font-size:13px;
display:flex;
justify-content:space-between;

}

</style>

</head>

<body>

<div class="painel">

<h3>Adicionar endereço</h3>

<input id="endereco" placeholder="Digite o endereço">

<div id="sugestoes"></div>

<label>Valor por KM (R$)</label>
<input id="valorKm" type="number" value="1">

<button class="add" onclick="adicionarEndereco()">Adicionar endereço</button>

<button class="rota" onclick="gerarRota()">Gerar rota otimizada</button>

<button class="despesa" onclick="adicionarDespesa()">Despesas diárias</button>

<button class="excel" onclick="baixarExcel()">Baixar Excel</button>

<button class="pdf" onclick="baixarPDF()">Baixar PDF</button>

<button class="limpar" onclick="limparTudo()">Limpar rota</button>

<div id="lista"></div>

</div>

<div class="resultado">

<h3>Resumo da rota</h3>

<div id="detalhes"></div>

<div id="total"></div>

</div>

<div id="map"></div>

<script>

const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

var map=L.map('map').setView([-22.9,-43.2],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map)

let pontos=[]
let marcadores=[]
let enderecos=[]
let rota=null
let despesas=0
let dadosRota=[]

function adicionarEndereco(){

let endereco=document.getElementById("endereco").value

if(endereco==""){
alert("Digite um endereço")
return
}

fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${endereco}`)

.then(r=>r.json())

.then(data=>{

let lat=data[0].lat
let lon=data[0].lon

let marker=L.marker([lat,lon],{draggable:true}).addTo(map)

marker.on("dragend",function(){

let pos=marker.getLatLng()
pontos[marcadores.indexOf(marker)]=[pos.lng,pos.lat]

})

marcadores.push(marker)
pontos.push([lon,lat])
enderecos.push(endereco)

atualizarLista()

map.setView([lat,lon],14)

document.getElementById("endereco").value=""

})

}

function atualizarLista(){

let lista=document.getElementById("lista")

lista.innerHTML=""

enderecos.forEach((end,i)=>{

let div=document.createElement("div")

div.className="listaItem"

div.innerHTML=end+
` <button onclick="remover(${i})">🗑</button>`

lista.appendChild(div)

})

}

function remover(i){

map.removeLayer(marcadores[i])

marcadores.splice(i,1)
pontos.splice(i,1)
enderecos.splice(i,1)

atualizarLista()

}

function gerarRota(){

if(pontos.length<2){
alert("Adicione pelo menos 2 endereços")
return
}

if(rota){
map.removeLayer(rota)
}

fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},

body:JSON.stringify({

coordinates:pontos,
optimize_waypoints:true

})

})

.then(r=>r.json())

.then(data=>{

let coords=data.features[0].geometry.coordinates

let latlngs=coords.map(c=>[c[1],c[0]])

rota=L.polyline(latlngs,{
color:"#00e5ff",
weight:6
}).addTo(map)

map.fitBounds(rota.getBounds())

calcular(data)

})

}

function calcular(data){

dadosRota=[]

let segmentos=data.features[0].properties.segments

let totalKm=0

let valorKm=parseFloat(document.getElementById("valorKm").value)

segmentos.forEach((seg,i)=>{

let km=seg.distance/1000

totalKm+=km

dadosRota.push({

ordem:i+1,
endereco:enderecos[i],
km:km

})

})

let custoKm=totalKm*valorKm

let total=custoKm+despesas

document.getElementById("detalhes").innerHTML=

`Distância total: ${totalKm.toFixed(2)} km<br>
Custo KM: R$ ${custoKm.toFixed(2)}<br>
Despesas: R$ ${despesas.toFixed(2)}`

document.getElementById("total").innerHTML=

`TOTAL: R$ ${total.toFixed(2)}`

}

function adicionarDespesa(){

let valor=prompt("Digite o valor da despesa diária")

if(valor){

despesas+=parseFloat(valor)

alert("Despesa adicionada!")

}

}

function baixarExcel(){

let planilha=dadosRota.map(d=>({

"Ordem":d.ordem,
"Endereço":d.endereco,
"KM":d.km.toFixed(2)

}))

let ws=XLSX.utils.json_to_sheet(planilha)

let wb=XLSX.utils.book_new()

XLSX.utils.book_append_sheet(wb,ws,"Rota")

XLSX.writeFile(wb,"rota.xlsx")

}

async function baixarPDF(){

const { jsPDF } = window.jspdf

let canvas=await html2canvas(document.getElementById("map"))

let img=canvas.toDataURL("image/png")

let pdf=new jsPDF()

pdf.text("Relatório de rota",10,10)

pdf.addImage(img,"PNG",10,20,180,100)

pdf.save("rota.pdf")

}

function limparTudo(){

if(rota){
map.removeLayer(rota)
}

marcadores.forEach(m=>map.removeLayer(m))

pontos=[]
marcadores=[]
enderecos=[]
dadosRota=[]
despesas=0

document.getElementById("lista").innerHTML=""
document.getElementById("detalhes").innerHTML=""
document.getElementById("total").innerHTML=""

map.setView([-22.9,-43.2],12)

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Roteador de Rotas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

body{
font-family: Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#222;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

#controls{
padding:15px;
background:white;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
display:flex;
gap:10px;
flex-wrap:wrap;
}

input{
padding:10px;
font-size:16px;
width:250px;
border:1px solid #ccc;
border-radius:5px;
}

button{
padding:10px 20px;
font-size:16px;
background:#2c7be5;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1a5ec8;
}

#map{
height:80vh;
}

</style>

</head>
<body>

<header>
Sistema de Rotas
</header>

<div id="controls">

<input id="origem" placeholder="Endereço de origem">

<input id="destino" placeholder="Endereço de destino">

<button onclick="calcularRota()">Calcular rota</button>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

const API_KEY = "COLOQUE_SUA_CHAVE_AQUI";

let map = L.map('map').setView([-22.9068, -43.1729], 13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
attribution:'© OpenStreetMap'
}).addTo(map);

let rotaLayer;

async function geocode(endereco){

let url = `https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(endereco)}`;

let res = await fetch(url);
let data = await res.json();

let coords = data.features[0].geometry.coordinates;

return coords;

}

async function calcularRota(){

let origem = document.getElementById("origem").value;
let destino = document.getElementById("destino").value;

if(!origem || !destino){
alert("Digite origem e destino");
return;
}

let origemCoord = await geocode(origem);
let destinoCoord = await geocode(destino);

let body = {
coordinates:[origemCoord,destinoCoord]
};

let response = await fetch(
"https://api.openrouteservice.org/v2/directions/driving-car/geojson",
{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},
body:JSON.stringify(body)
}
);

let data = await response.json();

if(rotaLayer){
map.removeLayer(rotaLayer);
}

rotaLayer = L.geoJSON(data).addTo(map);

map.fitBounds(rotaLayer.getBounds());

}

</script>

</body>
</html>

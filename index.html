<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Roteirizador de Visitas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#map{
height:100vh;
}

.painel{

position:absolute;
top:20px;
left:20px;
z-index:1000;

background:#1c1c1c;
padding:20px;
border-radius:10px;
width:320px;

}

input{

width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;

}

button{

margin-top:10px;
padding:10px;
width:100%;
border:none;
background:#2ecc71;
color:white;
font-weight:bold;
border-radius:6px;
cursor:pointer;

}

.sugestoes{

background:white;
color:black;
max-height:150px;
overflow:auto;
border-radius:6px;

}

.itemSugestao{

padding:8px;
cursor:pointer;

}

.itemSugestao:hover{

background:#eee;

}

.lista{

margin-top:10px;
font-size:13px;

}

</style>

</head>

<body>

<div class="painel">

<h3>Adicionar Visita</h3>

<input id="endereco" placeholder="Digite o endereço">

<div id="sugestoes" class="sugestoes"></div>

<button onclick="gerarRota()">Gerar rota</button>

<div class="lista" id="lista"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

var map = L.map('map').setView([-22.90,-43.20],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map)

let pontos = []
let marcadores = []
let rota

const input = document.getElementById("endereco")
const sugestoes = document.getElementById("sugestoes")
const lista = document.getElementById("lista")

input.addEventListener("input", function(){

let valor = this.value

if(valor.length < 3){
sugestoes.innerHTML=""
return
}

fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${valor}`)

.then(res=>res.json())

.then(data=>{

sugestoes.innerHTML=""

data.slice(0,5).forEach(local=>{

let div = document.createElement("div")
div.className="itemSugestao"
div.innerText=local.display_name

div.onclick = function(){

selecionarEndereco(local)

}

sugestoes.appendChild(div)

})

})

})

function selecionarEndereco(local){

sugestoes.innerHTML=""

input.value = local.display_name

let lat = parseFloat(local.lat)
let lon = parseFloat(local.lon)

let marker = L.marker([lat,lon]).addTo(map)

marker.bindPopup(local.display_name).openPopup()

marcadores.push(marker)

pontos.push([lon,lat])

map.setView([lat,lon],14)

lista.innerHTML += "• "+local.display_name+"<br>"

}

function gerarRota(){

if(pontos.length < 2){

alert("Adicione pelo menos 2 pontos")

return

}

if(rota){
map.removeLayer(rota)
}

fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},

body:JSON.stringify({
coordinates:pontos
})

})

.then(res=>res.json())

.then(data=>{

let coords = data.features[0].geometry.coordinates

let latlngs = coords.map(c=>[c[1],c[0]])

rota = L.polyline(latlngs,{
color:"cyan",
weight:5
}).addTo(map)

map.fitBounds(rota.getBounds())

})

}

</script>

</body>
</html>

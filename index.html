<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteirizador de Visitas Fluxomed</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root {
            --bg-dark: #090909;
            --card-dark: #1f1f1f;
            --uber-blue: #276ef1;
            --text-main: #ffffff;
            --text-dim: #afafaf;
            --danger: #e11900;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Style */
        #sidebar {
            width: 400px;
            background: var(--card-dark);
            padding: 20px;
            box-shadow: 2px 0 10px rgba(0,0,0,0.5);
            overflow-y: auto;
            z-index: 10;
            display: flex;
            flex-direction: column;
            transition: all 0.3s ease;
        }

        h1 { font-size: 1.2rem; color: var(--uber-blue); margin-bottom: 20px; font-weight: 800; }

        .input-group {
            position: relative;
            margin-bottom: 15px;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input {
            width: 100%;
            padding: 12px;
            background: #333;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--uber-blue); }

        .btn-remove {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--danger);
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
        }

        .actions { display: flex; flex-direction: column; gap: 10px; margin-top: 10px; }

        button {
            padding: 12px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        .btn-add { background: #333; color: white; }
        .btn-route { background: var(--uber-blue); color: white; }
        .btn-clear { background: transparent; color: var(--text-dim); border: 1px solid #444; }
        .btn-excel { background: #27ae60; color: white; display: none; }

        button:hover { opacity: 0.8; }

        /* Map Container */
        #map { flex-grow: 1; z-index: 1; }

        /* Loading Spinner */
        #loader {
            display: none;
            text-align: center;
            margin: 10px 0;
        }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: var(--uber-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Popup */
        .custom-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--card-dark);
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid var(--uber-blue);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            animation: slideIn 0.4s ease forwards;
        }
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
    </style>
</head>
<body>

    <div id="sidebar">
        <h1>ROTEIRIZADOR FLUXOMED</h1>
        
        <div id="address-container">
            <div class="input-group">
                <input type="text" class="addr-input" placeholder="Ponto de partida (Endereço, Nº, CEP)">
            </div>
            <div class="input-group">
                <input type="text" class="addr-input" placeholder="Destino (Endereço, Nº, CEP)">
            </div>
        </div>

        <div class="actions">
            <button class="btn-add" onclick="addInput()">+ Adicionar Parada</button>
            <button class="btn-route" onclick="calculateRoute()">Roteirizar Rota</button>
            
            <div id="loader">
                <div class="spinner"></div>
                <p>Otimizando trajeto...</p>
            </div>

            <button class="btn-clear" onclick="clearAll()">Limpar Rota</button>
            <button id="btnExcel" class="btn-excel" onclick="generateExcel()">Baixar Planilha Excel</button>
        </div>
    </div>

    <div id="map"></div>

    <div id="resultPopup" class="custom-popup"></div>

    <script>
        const apiKey = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";
        const costPerKm = 0.85;
        let map, routeLayer;
        let routeData = [];

        // Inicializa o Mapa
        function initMap() {
            map = L.map('map').setView([-22.78, -43.31], 12); // Padrão Duque de Caxias
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '© OpenStreetMap'
            }).addTo(map);
        }

        // Adiciona novos campos de entrada
        function addInput() {
            const container = document.getElementById('address-container');
            const div = document.createElement('div');
            div.className = 'input-group';
            div.innerHTML = `
                <input type="text" class="addr-input" placeholder="Próxima parada">
                <button class="btn-remove" onclick="this.parentElement.remove()">×</button>
            `;
            container.appendChild(div);
        }

        // Limpar tudo
        function clearAll() {
            document.querySelectorAll('.addr-input').forEach((input, index) => {
                if (index > 1) input.parentElement.remove();
                else input.value = '';
            });
            if (routeLayer) map.removeLayer(routeLayer);
            document.getElementById('resultPopup').style.display = 'none';
            document.getElementById('btnExcel').style.display = 'none';
            routeData = [];
        }

        // Geocodificação (Transformar endereço em Lat/Long)
        async function getCoords(address) {
            const response = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${apiKey}&text=${encodeURIComponent(address)}&size=1`);
            const data = await response.json();
            if (data.features && data.features.length > 0) {
                return data.features[0].geometry.coordinates;
            }
            return null;
        }

        // Cálculo da Rota
        async function calculateRoute() {
            const inputs = document.querySelectorAll('.addr-input');
            const coords = [];
            const addresses = [];

            document.getElementById('loader').style.display = 'block';

            for (let input of inputs) {
                if (input.value) {
                    const c = await getCoords(input.value);
                    if (c) {
                        coords.push(c);
                        addresses.push(input.value);
                    }
                }
            }

            if (coords.length < 2) {
                alert("Insira pelo menos dois endereços válidos.");
                document.getElementById('loader').style.display = 'none';
                return;
            }

            const body = { "coordinates": coords };

            try {
                const response = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car/geojson`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': apiKey
                    },
                    body: JSON.stringify(body)
                });

                const data = await response.json();
                
                if (routeLayer) map.removeLayer(routeLayer);
                routeLayer = L.geoJSON(data).addTo(map);
                map.fitBounds(routeLayer.getBounds());

                processResults(data, addresses);
            } catch (error) {
                console.error(error);
                alert("Erro ao calcular rota.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        function processResults(data, addresses) {
            const segments = data.features[0].properties.segments;
            let totalDist = 0;
            let html = `<h3>Resumo da Rota</h3>`;
            routeData = [];

            segments.forEach((seg, i) => {
                const distKm = (seg.distance / 1000).toFixed(2);
                const cost = (distKm * costPerKm).toFixed(2);
                totalDist += parseFloat(distKm);

                html += `<p style="font-size: 0.9rem; color: #afafaf;">
                    <strong>${i+1}º Trecho:</strong> ${distKm}km - R$ ${cost}
                </p>`;

                routeData.push({
                    ordem: i + 1,
                    endereco: addresses[i+1],
                    km: distKm,
                    valor: cost
                });
            });

            // Adiciona ponto inicial à planilha
            routeData.unshift({ ordem: 0, endereco: addresses[0], km: 0, valor: 0 });

            const totalCost = (totalDist * costPerKm).toFixed(2);
            html += `<hr><p><strong>Total: ${totalDist.toFixed(2)} km</strong></p>`;
            html += `<p style="color:var(--uber-blue); font-size: 1.2rem;"><strong>Custo Total: R$ ${totalCost}</strong></p>`;

            const popup = document.getElementById('resultPopup');
            popup.innerHTML = html;
            popup.style.display = 'block';
            document.getElementById('btnExcel').style.display = 'block';
        }

        function generateExcel() {
            const ws_data = [
                ["Ordem da Visita", "Endereço", "Km (desde última)", "Valor (desde última)", "Valor Total Acumulado"]
            ];

            let acumulado = 0;
            routeData.forEach((item, index) => {
                acumulado += parseFloat(item.valor);
                ws_data.push([
                    index === 0 ? "Partida" : item.ordem,
                    item.endereco,
                    item.km,
                    `R$ ${item.valor}`,
                    `R$ ${acumulado.toFixed(2)}`
                ]);
            });

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(ws_data);
            XLSX.utils.book_append_sheet(wb, ws, "Rota Fluxomed");
            XLSX.writeFile(wb, "Roteirizacao_Fluxomed.xlsx");
        }

        window.onload = initMap;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
background:#000;
font-family:Arial;
color:white;
margin:0;
}

.container{
width:420px;
position:absolute;
top:20px;
left:20px;
background:#111;
padding:20px;
border-radius:12px;
box-shadow:0 0 25px rgba(0,150,255,0.5);
z-index:999;
}

h2{
margin-top:0;
}

.input-group{
display:flex;
align-items:center;
margin-bottom:10px;
position:relative;
}

input{
flex:1;
padding:10px;
border-radius:6px;
border:none;
background:linear-gradient(145deg,#1c3c60,#0b223c);
color:white;
outline:none;
}

.trash{
margin-left:6px;
cursor:pointer;
color:#ff5c5c;
font-size:18px;
}

button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
background:#0078ff;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#00a2ff;
}

#map{
height:100vh;
}

.suggestions{
position:absolute;
top:38px;
left:0;
right:30px;
background:#0c1e32;
border-radius:6px;
max-height:160px;
overflow-y:auto;
z-index:1000;
}

.suggestion{
padding:8px;
cursor:pointer;
}

.suggestion:hover{
background:#0078ff;
}

.loading{
display:none;
text-align:center;
margin-top:10px;
}

.spinner{
border:4px solid #222;
border-top:4px solid #00a2ff;
border-radius:50%;
width:30px;
height:30px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<h2>Roteirizador</h2>

<div id="inputs"></div>

<button onclick="addInput()">+ Adicionar parada</button>
<button onclick="optimizeRoute()">Roteirizar Melhor Rota</button>
<button onclick="downloadExcel()">Baixar Excel</button>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div id="result"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const apiKey="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map=L.map('map').setView([-22.9,-43.2],11);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let markers=[];
let routeLayer;
let routeData=[];
let debounce;

function addInput(){

let div=document.createElement("div");
div.className="input-group";

div.innerHTML=`
<input type="text" placeholder="Digite um endereço">
<span class="trash" onclick="removeInput(this)">🗑</span>
<div class="suggestions"></div>
`;

let input=div.querySelector("input");

input.addEventListener("input",()=>{

clearTimeout(debounce);

debounce=setTimeout(()=>searchAddress(input),400);

});

document.getElementById("inputs").appendChild(div);

}

function removeInput(el){
el.parentElement.remove();
}

addInput();
addInput();

async function searchAddress(input){

let q=input.value;

if(q.length<3)return;

let url=`https://api.openrouteservice.org/geocode/autocomplete?api_key=${apiKey}&text=${encodeURIComponent(q)}`;

let res=await fetch(url);
let data=await res.json();

let box=input.parentElement.querySelector(".suggestions");
box.innerHTML="";

data.features.forEach(p=>{

let div=document.createElement("div");
div.className="suggestion";
div.innerText=p.properties.label;

div.onclick=()=>{

input.value=p.properties.label;

input.dataset.lat=p.geometry.coordinates[1];
input.dataset.lng=p.geometry.coordinates[0];

box.innerHTML="";

};

box.appendChild(div);

});

}

async function optimizeRoute(){

document.getElementById("loading").style.display="block";

markers.forEach(m=>map.removeLayer(m));
markers=[];

let inputs=document.querySelectorAll("#inputs input");

let coords=[];

for(let i of inputs){

if(!i.dataset.lat){
alert("Selecione o endereço na lista.");
return;
}

coords.push([
parseFloat(i.dataset.lng),
parseFloat(i.dataset.lat)
]);

}

let body={
coordinates:coords,
format:"geojson"
};

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
"Authorization":apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
});

let data=await res.json();

document.getElementById("loading").style.display="none";

if(routeLayer)map.removeLayer(routeLayer);

routeLayer=L.geoJSON(data,{
style:{color:"#00a2ff",weight:5}
}).addTo(map);

map.fitBounds(routeLayer.getBounds());

let segments=data.features[0].properties.segments;

routeData=[];
let result="";

segments.forEach((seg,i)=>{

let km=seg.distance/1000;
let cost=km*0.85;

let address=inputs[i+1].value;

routeData.push({
ordem:i+1,
endereco:address,
dist:km,
cost:cost
});

result+=`
<p>
${i+1} - ${address}<br>
Distância: ${km.toFixed(2)} km<br>
Custo: R$ ${cost.toFixed(2)}
</p>
`;

});

document.getElementById("result").innerHTML=result;

coords.forEach((c,i)=>{

let m=L.marker([c[1],c[0]]).addTo(map)
.bindPopup((i+1)+" - "+inputs[i].value);

markers.push(m);

});

}

function downloadExcel(){

let csv="Ordem,Endereço,Distancia desde último endereço (km),Custo desde último endereço (R$)\n";

routeData.forEach(r=>{
csv+=`${r.ordem},"${r.endereco}",${r.dist.toFixed(2)},${r.cost.toFixed(2)}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="rota.csv";

a.click();

}

</script>

</body>
</html>

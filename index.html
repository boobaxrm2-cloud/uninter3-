<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
font-family:Arial;
margin:20px;
}

#map{
height:500px;
margin-top:20px;
}

.inputBox{
margin:5px 0;
}

input{
width:350px;
padding:6px;
}

button{
padding:8px 12px;
margin:5px;
cursor:pointer;
}

.suggestions{
background:white;
border:1px solid #ccc;
max-width:350px;
position:absolute;
z-index:1000;
}

.suggestions div{
padding:5px;
cursor:pointer;
}

.suggestions div:hover{
background:#eee;
}

#resultado{
margin-top:10px;
font-size:18px;
}

</style>
</head>

<body>

<h2>Roteirizador Logístico</h2>

<div id="inputs"></div>

<button onclick="addInput()">Adicionar parada</button>
<button onclick="calcularRota()">Calcular rota</button>
<button onclick="limparRota()">Excluir rota</button>

<div id="resultado"></div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_KEY = "eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map = L.map('map').setView([-22.90,-43.20],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let rotaLayer;
let markers=[];

function addInput(){

let box = document.createElement("div");
box.className="inputBox";

let input = document.createElement("input");
input.placeholder="Digite um endereço";

let sug = document.createElement("div");
sug.className="suggestions";

input.addEventListener("input", async function(){

if(input.value.length<3){
sug.innerHTML="";
return;
}

let url = `https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(input.value)}`;

let res = await fetch(url);
let data = await res.json();

sug.innerHTML="";

data.forEach(place=>{

let item = document.createElement("div");

item.textContent = place.display_name;

item.onclick = function(){

input.value = place.display_name;

input.dataset.lon = place.lon;
input.dataset.lat = place.lat;

sug.innerHTML="";

};

sug.appendChild(item);

});

});

box.appendChild(input);
box.appendChild(sug);

document.getElementById("inputs").appendChild(box);

}

addInput();
addInput();

async function calcularRota(){

let inputs = document.querySelectorAll("#inputs input");

let coords=[];

inputs.forEach(i=>{

if(i.dataset.lon){

coords.push([
parseFloat(i.dataset.lon),
parseFloat(i.dataset.lat)
]);

}

});

if(coords.length<2){

alert("Digite pelo menos dois endereços");

return;

}

let res = await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},

body:JSON.stringify({
coordinates:coords
})

});

let data = await res.json();

if(rotaLayer) map.removeLayer(rotaLayer);

rotaLayer = L.geoJSON(data).addTo(map);

map.fitBounds(rotaLayer.getBounds());

markers.forEach(m=>map.removeLayer(m));
markers=[];

coords.forEach((c,i)=>{

let m = L.marker([c[1],c[0]]).addTo(map)
.bindPopup("Parada "+(i+1));

markers.push(m);

});

let distancia = data.features[0].properties.summary.distance/1000;

let custo = distancia * 0.85;

document.getElementById("resultado").innerHTML =

`Distância total: <b>${distancia.toFixed(2)} km</b><br>
Custo estimado: <b>R$ ${custo.toFixed(2)}</b>`;

}

function limparRota(){

if(rotaLayer){
map.removeLayer(rotaLayer);
}

markers.forEach(m=>map.removeLayer(m));
markers=[];

document.getElementById("resultado").innerHTML="";

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ROTEIRIZADOR DE VISITAS FLUXOMED</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f19;
color:white;
}

#map{
position:absolute;
right:0;
top:0;
height:100%;
width:70%;
}

.panel{
position:absolute;
left:0;
top:0;
height:100%;
width:30%;
background:#111827;
padding:25px;
overflow:auto;
}

h1{
color:#3b82f6;
}

input{
width:100%;
padding:10px;
margin-bottom:5px;
border:none;
border-radius:6px;
background:#1f2937;
color:white;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
margin-top:8px;
cursor:pointer;
font-weight:bold;
}

.btn-add{background:#2563eb;color:white;}
.btn-remove{background:#dc2626;color:white;}
.btn-route{background:#10b981;color:white;}
.btn-pdf{background:#9333ea;color:white;}

.address{
position:relative;
display:flex;
gap:5px;
}

.suggestions{
position:absolute;
background:#1f2937;
top:38px;
left:0;
right:40px;
z-index:999;
border-radius:6px;
max-height:150px;
overflow:auto;
}

.suggestions div{
padding:8px;
cursor:pointer;
}

.suggestions div:hover{
background:#374151;
}

.marker-number{
background:#2563eb;
color:white;
border-radius:50%;
width:26px;
height:26px;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
}

.loader{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:8px;
display:none;
}

</style>
</head>

<body>

<div class="panel">

<h1>ROTEIRIZADOR DE VISITAS FLUXOMED</h1>

<label>Técnico</label>
<input id="tecnico">

<div id="enderecos"></div>

<button class="btn-add" onclick="addEndereco()">Adicionar endereço</button>

<label>
<input type="checkbox" id="almoco">
Incluir almoço (R$25,90)
</label>

<button class="btn-route" onclick="roteirizar()">Roteirizar</button>

<button class="btn-pdf" onclick="exportPDF()">Exportar PDF</button>

<div id="resultado"></div>

</div>

<div id="map"></div>

<div class="loader" id="loader">Calculando rota...</div>

<script>

const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

let map=L.map('map').setView([-22.9,-43.2],11)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map)

let markers=[]
let routeLayer=null
let visitOrder=[]
let totalDist=0

function addEndereco(){

let div=document.createElement("div")
div.className="address"

div.innerHTML=`
<input oninput="autocomplete(this)" placeholder="Digite endereço">
<button class="btn-remove" onclick="this.parentElement.remove()">X</button>
<div class="suggestions"></div>
`

document.getElementById("enderecos").appendChild(div)

}

addEndereco()
addEndereco()

async function autocomplete(input){

let box=input.parentElement.querySelector(".suggestions")

if(input.value.length<3){
box.innerHTML=""
return
}

let url=`https://api.openrouteservice.org/geocode/autocomplete?api_key=${API_KEY}&text=${input.value}`

let res=await fetch(url)
let data=await res.json()

box.innerHTML=""

data.features.slice(0,5).forEach(place=>{

let div=document.createElement("div")
div.innerText=place.properties.label

div.onclick=()=>{
input.value=place.properties.label
input.dataset.lng=place.geometry.coordinates[0]
input.dataset.lat=place.geometry.coordinates[1]
box.innerHTML=""
}

box.appendChild(div)

})

}

async function roteirizar(){

document.getElementById("loader").style.display="block"

let inputs=document.querySelectorAll("#enderecos input")

let jobs=[]
let coords=[]

inputs.forEach((input,i)=>{

if(!input.dataset.lat) return

coords.push([Number(input.dataset.lng),Number(input.dataset.lat)])

jobs.push({
id:i,
location:[Number(input.dataset.lng),Number(input.dataset.lat)]
})

})

if(coords.length<2){
alert("Adicione pelo menos 2 endereços")
return
}

let body={
jobs:jobs,
vehicles:[{
id:1,
start:coords[0],
end:coords[0]
}]
}

let opt=await fetch("https://api.openrouteservice.org/optimization",{
method:"POST",
headers:{
Authorization:API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
})

let optData=await opt.json()

visitOrder=[]

optData.routes[0].steps.forEach(step=>{
if(step.type=="job") visitOrder.push(step.id)
})

let orderedCoords=visitOrder.map(i=>coords[i])

let route=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
Authorization:API_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
coordinates:orderedCoords
})
})

let routeData=await route.json()

totalDist=routeData.routes[0].summary.distance/1000

drawRoute(routeData.routes[0].geometry,orderedCoords)

calcValor()

document.getElementById("loader").style.display="none"

}

function drawRoute(geometry,coords){

if(routeLayer) map.removeLayer(routeLayer)

let decoded=decodePolyline(geometry)

routeLayer=L.polyline(decoded,{color:"#3b82f6",weight:5}).addTo(map)

markers.forEach(m=>map.removeLayer(m))
markers=[]

coords.forEach((c,i)=>{

let icon=L.divIcon({
className:"marker-number",
html:i+1
})

let marker=L.marker([c[1],c[0]],{icon}).addTo(map)

markers.push(marker)

})

map.fitBounds(routeLayer.getBounds())

}

function calcValor(){

let valorKm=0.85
let valor=totalDist*valorKm

let almoco=document.getElementById("almoco").checked?25.90:0

let total=valor+almoco

document.getElementById("resultado").innerHTML=`
Distância: ${totalDist.toFixed(2)} km<br>
Valor km: R$ ${valor.toFixed(2)}<br>
Total: R$ ${total.toFixed(2)}
`

}

function decodePolyline(str,precision){

let index=0,lat=0,lng=0,coordinates=[]
precision=Math.pow(10,precision||5)

while(index<str.length){

let b,shift=0,result=0

do{
b=str.charCodeAt(index++)-63
result|=(b&0x1f)<<shift
shift+=5
}while(b>=0x20)

let dlat=((result&1)?~(result>>1):(result>>1))
lat+=dlat

shift=0
result=0

do{
b=str.charCodeAt(index++)-63
result|=(b&0x1f)<<shift
shift+=5
}while(b>=0x20)

let dlng=((result&1)?~(result>>1):(result>>1))
lng+=dlng

coordinates.push([lat/precision,lng/precision])

}

return coordinates

}

async function exportPDF(){

const {jsPDF}=window.jspdf

let canvas=await html2canvas(document.getElementById("map"))

let img=canvas.toDataURL("image/png")

let pdf=new jsPDF()

pdf.text("ROTEIRIZADOR DE VISITAS FLUXOMED",10,10)

pdf.addImage(img,"PNG",10,20,190,100)

let y=130

pdf.text("Técnico: "+document.getElementById("tecnico").value,10,y)

y+=10

pdf.text("Distância: "+totalDist.toFixed(2)+" km",10,y)

y+=10

pdf.text("Visitas:",10,y)

y+=10

visitOrder.forEach((v,i)=>{
pdf.text((i+1)+" - Visita "+(v+1),10,y)
y+=8
})

pdf.save("rota_fluxomed.pdf")

}

</script>

</body>
</html>

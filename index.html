<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#000;
color:white;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:20px;
left:20px;
width:420px;
background:#0b0b0b;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,150,255,0.5);
z-index:1000;
}

.title{
font-size:20px;
margin-bottom:10px;
}

.input-row{
display:flex;
align-items:center;
margin-bottom:8px;
position:relative;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
color:white;
background:linear-gradient(145deg,#0f2c4f,#0b1c30);
}

.trash{
margin-left:8px;
cursor:pointer;
font-size:18px;
color:#ff5e5e;
}

button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
background:#0077ff;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#00a2ff;
}

.suggestions{
position:absolute;
top:40px;
left:0;
right:30px;
background:#061524;
border-radius:6px;
overflow:hidden;
max-height:160px;
overflow-y:auto;
animation:fade .2s;
z-index:2000;
}

.suggestion{
padding:8px;
cursor:pointer;
transition:0.2s;
}

.suggestion:hover{
background:#0080ff;
}

@keyframes fade{
from{opacity:0;transform:translateY(-4px);}
to{opacity:1;transform:translateY(0);}
}

.loading{
display:none;
text-align:center;
margin-top:10px;
}

.spinner{
width:30px;
height:30px;
border-radius:50%;
border:4px solid #222;
border-top:4px solid #00a2ff;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

.result{
margin-top:10px;
font-size:13px;
line-height:18px;
}

</style>
</head>

<body>

<div class="panel">

<div class="title">Roteirizador Logístico</div>

<div id="inputs"></div>

<button onclick="addInput()">+ Adicionar parada</button>

<button onclick="route()">Roteirizar Melhor Rota</button>

<button onclick="downloadExcel()">Baixar Excel</button>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div class="result" id="result"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const apiKey="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map=L.map("map").setView([-22.9,-43.2],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let routeLayer;
let routeData=[];

function addInput(){

let row=document.createElement("div");
row.className="input-row";

row.innerHTML=`
<input type="text" placeholder="Digite endereço..." oninput="autocomplete(this)">
<span class="trash" onclick="removeRow(this)">🗑</span>
<div class="suggestions"></div>
`;

document.getElementById("inputs").appendChild(row);

}

function removeRow(el){
el.parentElement.remove();
}

addInput();
addInput();

async function autocomplete(input){

let text=input.value;

if(text.length<3)return;

let url=`https://api.openrouteservice.org/geocode/autocomplete?api_key=${apiKey}&text=${text}`;

let res=await fetch(url);
let data=await res.json();

let box=input.parentElement.querySelector(".suggestions");
box.innerHTML="";

data.features.forEach(place=>{

let div=document.createElement("div");
div.className="suggestion";
div.innerText=place.properties.label;

div.onclick=()=>{

input.value=place.properties.label;
input.dataset.lng=place.geometry.coordinates[0];
input.dataset.lat=place.geometry.coordinates[1];
box.innerHTML="";

};

box.appendChild(div);

});

}

async function route(){

document.getElementById("loading").style.display="block";

let inputs=document.querySelectorAll("#inputs input");

let coords=[];

inputs.forEach(i=>{
coords.push([parseFloat(i.dataset.lng),parseFloat(i.dataset.lat)]);
});

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{
method:"POST",
headers:{
"Authorization":apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify({coordinates:coords})
});

let data=await res.json();

document.getElementById("loading").style.display="none";

let route=data.routes[0];

if(routeLayer) map.removeLayer(routeLayer);

routeLayer=L.geoJSON({
type:"Feature",
geometry:route.geometry
}).addTo(map);

map.fitBounds(routeLayer.getBounds());

routeData=[];

let resultHTML="";

let segments=route.segments[0].steps;

segments.forEach((step,i)=>{

let km=step.distance/1000;

let cost=km*0.85;

let address=document.querySelectorAll("#inputs input")[i].value;

routeData.push({
ordem:i+1,
endereco:address,
distancia:km,
custo:cost
});

resultHTML+=`
<b>${i+1}</b> ${address}<br>
Distância desde último endereço: ${km.toFixed(2)} km<br>
Custo desde último endereço: R$ ${cost.toFixed(2)}<br><br>
`;

});

document.getElementById("result").innerHTML=resultHTML;

}

function downloadExcel(){

let csv="ordem,endereço,distancia desde o último endereço,custo desde o último endereço\n";

routeData.forEach(r=>{
csv+=`${r.ordem},"${r.endereco}",${r.distancia.toFixed(2)},${r.custo.toFixed(2)}\n`;
});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="rota_logistica.csv";
a.click();

}

</script>

</body>
</html>

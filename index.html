<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteirizador de Visitas Fluxomed</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --dark-bg: #0b0e14;
            --panel-bg: #161b22;
            --flux-blue: #0078ff;
            --text-white: #e6edf3;
            --danger: #ff4d4d;
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--dark-bg); color: var(--text-white); }
        
        #app { display: flex; height: 100vh; overflow: hidden; }

        /* Painel Lateral */
        #side-panel { width: 400px; background: var(--panel-bg); padding: 20px; box-shadow: 2px 0 10px rgba(0,0,0,0.5); z-index: 1000; overflow-y: auto; display: flex; flex-direction: column; }
        
        h2 { color: var(--flux-blue); font-size: 1.5rem; margin-bottom: 20px; text-align: center; border-bottom: 2px solid var(--flux-blue); padding-bottom: 10px; }

        .input-group { margin-bottom: 15px; position: relative; }
        label { display: block; margin-bottom: 5px; font-size: 0.9rem; color: #8b949e; }
        
        input[type="text"] {
            width: 100%; padding: 10px; background: #0d1117; border: 1px solid #30363d;
            color: white; border-radius: 6px; box-sizing: border-box;
        }

        /* Autocomplete Suggestions */
        .autocomplete-list {
            position: absolute; width: 100%; background: #21262d; border: 1px solid #30363d;
            z-index: 1001; max-height: 200px; overflow-y: auto; border-radius: 0 0 6px 6px;
        }
        .suggestion-item { padding: 10px; cursor: pointer; font-size: 0.85rem; border-bottom: 1px solid #30363d; }
        .suggestion-item:hover { background: var(--flux-blue); }

        .stop-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .btn-remove { color: var(--danger); cursor: pointer; font-size: 1.2rem; }

        /* Toggle Almoço */
        .switch-container { display: flex; align-items: center; justify-content: space-between; margin: 20px 0; background: #0d1117; padding: 10px; border-radius: 8px; }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #30363d; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--flux-blue); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Botões */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 10px; transition: 0.3s; }
        .btn-add { background: transparent; border: 1px dashed var(--flux-blue); color: var(--flux-blue); }
        .btn-add:hover { background: rgba(0,120,255,0.1); }
        .btn-main { background: var(--flux-blue); color: white; font-size: 1rem; }
        .btn-clear { background: #30363d; color: white; }

        /* Mapa */
        #map { flex-grow: 1; z-index: 1; }

        /* Popup Resultado */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
        }
        #result-popup {
            background: var(--panel-bg); padding: 30px; border-radius: 12px; width: 90%; max-width: 500px;
            border: 2px solid var(--flux-blue); text-align: center;
        }
        .summary-item { display: flex; justify-content: space-between; margin: 15px 0; padding-bottom: 5px; border-bottom: 1px solid #30363d; }

        /* Loading */
        #loader { display: none; margin: 20px auto; border: 4px solid #f3f3f3; border-top: 4px solid var(--flux-blue); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="app">
    <div id="side-panel">
        <h2>FLUXOMED</h2>
        
        <div class="input-group">
            <label>Técnico Responsável</label>
            <input type="text" id="tech-name" placeholder="Nome do Técnico">
        </div>

        <div id="stops-container">
            <div class="input-group">
                <label>Endereço Inicial</label>
                <div class="stop-row">
                    <input type="text" class="addr-input" placeholder="Digite o endereço..." oninput="handleAutocomplete(this)">
                    <i class="fas fa-trash btn-remove" style="visibility: hidden;"></i>
                </div>
                <div class="autocomplete-list"></div>
            </div>
            
            <div class="input-group">
                <label>Endereço 2</label>
                <div class="stop-row">
                    <input type="text" class="addr-input" placeholder="Digite o endereço..." oninput="handleAutocomplete(this)">
                    <i class="fas fa-trash btn-remove" onclick="removeStop(this)"></i>
                </div>
                <div class="autocomplete-list"></div>
            </div>
        </div>

        <button class="btn btn-add" onclick="addStop()"><i class="fas fa-plus"></i> Inserir Novo Endereço</button>

        <div class="switch-container">
            <span>Adicionar Almoço (R$ 25,90)</span>
            <label class="switch">
                <input type="checkbox" id="lunch-toggle">
                <span class="slider"></span>
            </label>
        </div>

        <button class="btn btn-main" onclick="calculateRoute()">Roteirizar Rotas</button>
        <button class="btn btn-clear" onclick="resetRoute()">Limpar Rota</button>
        
        <div id="loader"></div>
    </div>

    <div id="map"></div>
</div>

<div id="overlay">
    <div id="result-popup">
        <h3 style="color: var(--flux-blue);">Resumo da Rota</h3>
        <div id="summary-content"></div>
        <button class="btn btn-main" onclick="downloadExcel()"><i class="fas fa-file-excel"></i> Baixar Excel</button>
        <button class="btn btn-clear" onclick="closePopup()">Fechar</button>
    </div>
</div>

<script>
    const API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=';
    let map = L.map('map').setView([-22.7846, -43.3121], 12); // Centralizado em Duque de Caxias
    let markers = [];
    let routeLine = null;
    let routeData = []; // Armazena info para o Excel

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
        attribution: 'Fluxomed'
    }).addTo(map);

    function addStop() {
        const container = document.getElementById('stops-container');
        const count = container.children.length + 1;
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `
            <label>Endereço ${count}</label>
            <div class="stop-row">
                <input type="text" class="addr-input" placeholder="Digite o endereço..." oninput="handleAutocomplete(this)">
                <i class="fas fa-trash btn-remove" onclick="removeStop(this)"></i>
            </div>
            <div class="autocomplete-list"></div>
        `;
        container.appendChild(div);
    }

    function removeStop(el) {
        el.closest('.input-group').remove();
    }

    async function handleAutocomplete(input) {
        const query = input.value;
        const list = input.parentElement.nextElementSibling;
        if (query.length < 5) { list.innerHTML = ''; return; }

        try {
            const resp = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${API_KEY}&text=${encodeURIComponent(query)}&size=5&boundary.country=BR`);
            const data = await resp.json();
            
            list.innerHTML = '';
            data.features.forEach(f => {
                const item = document.createElement('div');
                item.className = 'suggestion-item';
                item.innerText = f.properties.label;
                item.onclick = () => {
                    input.value = f.properties.label;
                    input.dataset.lat = f.geometry.coordinates[1];
                    input.dataset.lng = f.geometry.coordinates[0];
                    list.innerHTML = '';
                    updateMapMarkers();
                };
                list.appendChild(item);
            });
        } catch (e) { console.error("Erro no autocomplete", e); }
    }

    function updateMapMarkers() {
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        const inputs = document.querySelectorAll('.addr-input');
        inputs.forEach(input => {
            if (input.dataset.lat) {
                const m = L.marker([input.dataset.lat, input.dataset.lng]).addTo(map);
                markers.push(m);
            }
        });
    }

    async function calculateRoute() {
        const inputs = Array.from(document.querySelectorAll('.addr-input')).filter(i => i.dataset.lat);
        if (inputs.length < 2) { alert("Selecione pelo menos 2 endereços."); return; }

        document.getElementById('loader').style.display = 'block';
        const coords = inputs.map(i => [parseFloat(i.dataset.lng), parseFloat(i.dataset.lat)]);

        try {
            const response = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car/geojson`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': API_KEY },
                body: JSON.stringify({ coordinates: coords })
            });
            const data = await response.json();
            
            if (routeLine) map.removeLayer(routeLine);
            routeLine = L.geoJSON(data, { style: { color: '#0078ff', weight: 5 } }).addTo(map);
            map.fitBounds(routeLine.getBounds());

            processResults(data, inputs);
        } catch (e) {
            alert("Erro ao calcular rota.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function processResults(data, inputs) {
        const segments = data.features[0].properties.segments;
        const techName = document.getElementById('tech-name').value || "Não informado";
        const hasLunch = document.getElementById('lunch-toggle').checked;
        const lunchCost = hasLunch ? 25.90 : 0;
        
        let totalKm = 0;
        routeData = [];

        // Primeiro ponto (Início)
        routeData.push({ ordem: 1, endereco: inputs[0].value, km: 0, custo: 0 });

        segments.forEach((s, i) => {
            const km = s.distance / 1000;
            const custo = km * 0.85;
            totalKm += km;
            routeData.push({
                ordem: i + 2,
                endereco: inputs[i+1].value,
                km: km.toFixed(2),
                custo: custo.toFixed(2)
            });
        });

        const totalCustoRotas = totalKm * 0.85;
        const totalGeral = totalCustoRotas + lunchCost;

        // Mostrar Popup
        document.getElementById('summary-content').innerHTML = `
            <div class="summary-item"><span>Técnico:</span> <span>${techName}</span></div>
            <div class="summary-item"><span>Distância Total:</span> <span>${totalKm.toFixed(2)} km</span></div>
            <div class="summary-item"><span>Custo Deslocamento:</span> <span>R$ ${totalCustoRotas.toFixed(2)}</span></div>
            <div class="summary-item"><span>Custo Almoço:</span> <span>R$ ${lunchCost.toFixed(2)}</span></div>
            <div class="summary-item" style="border-top: 2px solid var(--flux-blue); font-weight: bold;">
                <span>TOTAL DO DIA:</span> <span>R$ ${totalGeral.toFixed(2)}</span>
            </div>
        `;
        document.getElementById('overlay').style.display = 'flex';
    }

    function downloadExcel() {
        const techName = document.getElementById('tech-name').value;
        const hasLunch = document.getElementById('lunch-toggle').checked;
        const lunchCost = hasLunch ? 25.90 : 0;
        
        const wb = XLSX.utils.book_new();
        const wsData = [
            ["Relatório de Visitas - Fluxomed", "", "", ""],
            ["Técnico:", techName, "", ""],
            ["", "", "", ""],
            ["Ordem", "Endereço", "KM desde último ponto", "Custo (R$ 0,85/km)"]
        ];

        let totalVisitas = 0;
        routeData.forEach(item => {
            wsData.push([item.ordem, item.endereco, item.km, item.custo]);
            totalVisitas += parseFloat(item.custo);
        });

        wsData.push(["", "", "", ""]);
        wsData.push(["", "", "Custo Total Deslocamento:", totalVisitas.toFixed(2)]);
        wsData.push(["", "", "Almoço:", lunchCost.toFixed(2)]);
        wsData.push(["", "", "CUSTO TOTAL DO DIA:", (totalVisitas + lunchCost).toFixed(2)]);

        const ws = XLSX.utils.aoa_to_sheet(wsData);
        XLSX.utils.book_append_sheet(wb, ws, "Rota");
        XLSX.writeFile(wb, `Rota_Fluxomed_${techName}.xlsx`);
    }

    function resetRoute() {
        location.reload();
    }

    function closePopup() {
        document.getElementById('overlay').style.display = 'none';
    }
</script>

</body>
</html>

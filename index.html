<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8">

<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

<style>

body{
margin:0;
font-family:Segoe UI;
display:flex;
height:100vh;
background:#0f1117;
color:white;
}

#sidebar{
width:420px;
background:#161a23;
padding:20px;
overflow:auto;
box-shadow:0 0 25px rgba(0,0,0,0.6);
}

#map{
flex:1;
}

h2{
margin-top:0;
color:#00e5ff;
}

.parada{
margin-bottom:10px;
display:flex;
align-items:center;
gap:6px;
position:relative;
}

input{
flex:1;
padding:9px;
border-radius:6px;
border:none;
background:linear-gradient(145deg,#1c2a3a,#243a55);
color:white;
}

input::placeholder{
color:#a8c7ff;
}

button{
padding:9px;
border:none;
border-radius:6px;
cursor:pointer;
font-weight:bold;
}

.btn-main{
background:#00e5ff;
color:black;
}

.btn-secondary{
background:#2b3243;
color:white;
}

.btn-delete{
background:transparent;
font-size:18px;
}

.btn-delete:hover{
color:#ff4d4d;
}

.suggestions{
background:#1e2430;
border:1px solid #444;
border-radius:6px;
max-height:150px;
overflow:auto;
position:absolute;
top:40px;
left:0;
right:30px;
z-index:1000;

opacity:0;
transform:translateY(-10px);
transition:all .25s ease;
}

.suggestions.show{
opacity:1;
transform:translateY(0);
}

.suggestions div{
padding:7px;
cursor:pointer;
transition:all .2s;
}

.suggestions div:hover{
background:#2b3243;
padding-left:12px;
}

#resultado{
margin-top:15px;
font-size:16px;
}

#loading{
display:none;
text-align:center;
margin-top:15px;
}

.spinner{
border:5px solid #2b3243;
border-top:5px solid #00e5ff;
border-radius:50%;
width:40px;
height:40px;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>
</head>

<body>

<div id="sidebar">

<h2>Roteirizador</h2>

<div id="inputs"></div>

<button class="btn-secondary" onclick="addInput()">+ Adicionar parada</button>

<button class="btn-main" onclick="calcularRota()">Calcular rota</button>

<button class="btn-secondary" onclick="baixarExcel()">Baixar Excel</button>

<button class="btn-secondary" onclick="limparRota()">Limpar rota</button>

<div id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div id="resultado"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map=L.map('map').setView([-22.9,-43.2],12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

let rotaLayer;
let markers=[];
let rotaDados=[];

function addInput(){

let div=document.createElement("div");
div.className="parada";

let input=document.createElement("input");
input.placeholder="Digite endereço";

let deleteBtn=document.createElement("button");
deleteBtn.className="btn-delete";
deleteBtn.innerHTML="🗑️";
deleteBtn.onclick=()=>div.remove();

let sug=document.createElement("div");
sug.className="suggestions";

input.addEventListener("input",async function(){

if(input.value.length<3){
sug.classList.remove("show");
sug.innerHTML="";
return;
}

let url=`https://nominatim.openstreetmap.org/search?format=json&limit=5&q=${encodeURIComponent(input.value)}`;

let res=await fetch(url);
let data=await res.json();

sug.innerHTML="";

data.forEach(p=>{

let item=document.createElement("div");

item.textContent=p.display_name;

item.onclick=function(){

input.value=p.display_name;
input.dataset.lat=p.lat;
input.dataset.lon=p.lon;

sug.classList.remove("show");

};

sug.appendChild(item);

});

sug.classList.add("show");

});

div.appendChild(input);
div.appendChild(deleteBtn);
div.appendChild(sug);

document.getElementById("inputs").appendChild(div);

}

addInput();
addInput();

async function calcularRota(){

document.getElementById("loading").style.display="block";

let inputs=document.querySelectorAll("#inputs input");

let coords=[];
let enderecos=[];

inputs.forEach(i=>{

if(i.dataset.lon){

coords.push([parseFloat(i.dataset.lon),parseFloat(i.dataset.lat)]);
enderecos.push(i.value);

}

});

if(coords.length<2){
alert("Digite ao menos 2 endereços");
document.getElementById("loading").style.display="none";
return;
}

let res=await fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},

body:JSON.stringify({coordinates:coords})

});

let data=await res.json();

if(rotaLayer) map.removeLayer(rotaLayer);

rotaLayer=L.geoJSON(data).addTo(map);

map.fitBounds(rotaLayer.getBounds());

markers.forEach(m=>map.removeLayer(m));
markers=[];

coords.forEach((c,i)=>{

let m=L.marker([c[1],c[0]]).addTo(map).bindPopup(enderecos[i]);

markers.push(m);

});

let legs=data.features[0].properties.segments[0].steps;

rotaDados=[];

let distanciaTotal=0;

for(let i=0;i<coords.length;i++){

let dist=0;

if(i>0){

dist=data.features[0].properties.segments[0].distance/(coords.length-1)/1000;

}

let custo=dist*0.85;

distanciaTotal+=dist;

rotaDados.push({

Ordem:i+1,
Endereco:enderecos[i],
Distancia_km:dist.toFixed(2),
Custo_R$:custo.toFixed(2)

});

}

let custoTotal=distanciaTotal*0.85;

document.getElementById("resultado").innerHTML=
`Distância total: <b>${distanciaTotal.toFixed(2)} km</b><br>
Custo total: <b>R$ ${custoTotal.toFixed(2)}</b>`;

document.getElementById("loading").style.display="none";

}

function limparRota(){

if(rotaLayer) map.removeLayer(rotaLayer);

markers.forEach(m=>map.removeLayer(m));

markers=[];

document.getElementById("resultado").innerHTML="";

}

function baixarExcel(){

if(rotaDados.length==0){
alert("Calcule a rota primeiro");
return;
}

let ws=XLSX.utils.json_to_sheet(rotaDados);

let wb=XLSX.utils.book_new();

XLSX.utils.book_append_sheet(wb,ws,"Rota");

XLSX.writeFile(wb,"rota_logistica.xlsx");

}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Roteiro de Visitas Fluxomed</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
background:#000814;
font-family:Arial;
color:white;
margin:0;
overflow:hidden;
}

.container{
display:flex;
height:100vh;
}

/* PAINEL */
.painel{
width:420px;
background:#0b1a2a;
padding:20px;
box-shadow:0 0 40px rgba(0,0,0,0.7);
z-index:2;
position:relative;
}

/* DIVISOR SUAVE */
.divisor{
width:6px;
background:linear-gradient(
to right,
rgba(0,0,0,0),
rgba(0,180,255,0.6),
rgba(0,0,0,0)
);
box-shadow:0 0 20px rgba(0,180,255,0.4);
}

/* MAPA */
#map{
flex:1;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:6px;
font-size:14px;
}

/* BOTÕES */

button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
background:#0ea5e9;
color:white;
transition:0.3s;
}

button:hover{
background:#0284c7;
}

/* RESULTADO */

#resultado{
position:absolute;
bottom:30px;
left:30px;
background:#02101d;
padding:20px;
border-radius:10px;
box-shadow:0 0 25px rgba(0,0,0,0.8);
width:260px;
}

</style>
</head>

<body>

<div class="container">

<div class="painel">

<h2>Roteiro de Visitas Fluxomed</h2>

<input id="origem" placeholder="Endereço inicial">

<div id="enderecos"></div>

<button onclick="addEndereco()">Adicionar endereço</button>

<button onclick="roteirizar()">Roteirizar Rotas</button>

<button onclick="limpar()">Limpar rota</button>

<input id="valorKm" placeholder="Valor por KM (R$)" type="number">

</div>

<div class="divisor"></div>

<div id="map"></div>

</div>

<div id="resultado"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

var map = L.map('map').setView([-22.574, -43.278], 12);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
maxZoom:19
}).addTo(map);

var enderecos = [];
var marcadores = [];
var rotaLayer = null;

function addEndereco(){

let container = document.getElementById("enderecos");

let input = document.createElement("input");
input.placeholder="Destino";

container.appendChild(input);

enderecos.push(input);

}

async function geocode(endereco){

let url=`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(endereco)}`;

let res=await fetch(url);
let data=await res.json();

if(data.length==0) return null;

return [parseFloat(data[0].lat),parseFloat(data[0].lon)];

}

/* OTIMIZAÇÃO SIMPLES (vizinho mais próximo) */

function otimizar(pontos){

let rota=[pontos[0]];
let restantes=pontos.slice(1);

while(restantes.length){

let ultimo=rota[rota.length-1];

let menorDist=999999;
let indice=0;

for(let i=0;i<restantes.length;i++){

let d=map.distance(ultimo,restantes[i]);

if(d<menorDist){
menorDist=d;
indice=i;
}

}

rota.push(restantes[indice]);
restantes.splice(indice,1);

}

return rota;

}

/* DESENHO ANIMADO DA ROTA */

function desenharRotaAnimada(coords){

if(rotaLayer) map.removeLayer(rotaLayer);

rotaLayer=L.polyline([],{color:"cyan",weight:5}).addTo(map);

let i=0;

let intervalo=setInterval(()=>{

rotaLayer.addLatLng(coords[i]);

i++;

if(i>=coords.length){
clearInterval(intervalo);
}

},120);

}

/* ROTEIRIZAR */

async function roteirizar(){

let origem=document.getElementById("origem").value;

let pontos=[];

let geo=await geocode(origem);

if(!geo){
alert("Origem não encontrada");
return;
}

pontos.push(geo);

for(let input of enderecos){

let g=await geocode(input.value);

if(g) pontos.push(g);

}

let otimizada=otimizar(pontos);

desenharRotaAnimada(otimizada);

map.fitBounds(otimizada);

let distancia=0;

for(let i=0;i<otimizada.length-1;i++){

distancia+=map.distance(otimizada[i],otimizada[i+1]);

}

distancia=distancia/1000;

let valor=document.getElementById("valorKm").value || 0;

let custo=(distancia*valor).toFixed(2);

document.getElementById("resultado").innerHTML=
`
<h3>Resumo</h3>
Distância: ${distancia.toFixed(2)} km<br><br>
Custo estimado: R$ ${custo}
`;

}

/* LIMPAR */

function limpar(){

if(rotaLayer) map.removeLayer(rotaLayer);

document.getElementById("resultado").innerHTML="";

}

</script>

</body>
</html>

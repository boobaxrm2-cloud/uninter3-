<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxomed - Roteirizador de Visitas</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00d4ff;
            --dark-bg: #0a0b10;
            --panel-bg: rgba(16, 18, 27, 0.95);
            --glass-border: rgba(0, 212, 255, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            overflow: hidden;
        }

        /* Design Futurista */
        h1, h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        #app-container { display: flex; height: 100vh; }

        /* Painel Lateral */
        #side-panel {
            width: 400px;
            background: var(--panel-bg);
            border-right: 1px solid var(--glass-border);
            padding: 20px;
            display: flex;
            flex-direction: column;
            z-index: 1000;
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .header-logo { color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue); margin-bottom: 20px; }

        .input-group { margin-bottom: 15px; position: relative; }
        
        input {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            padding: 12px;
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--neon-blue); box-shadow: 0 0 10px rgba(0,212,255,0.2); }

        .stop-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .remove-btn { color: #ff4d4d; cursor: pointer; font-size: 1.2rem; transition: 0.3s; }
        .remove-btn:hover { transform: scale(1.2); }

        /* Autocomplete List */
        .autocomplete-list {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a1c26;
            border: 1px solid var(--neon-blue);
            z-index: 2000;
            max-height: 200px;
            overflow-y: auto;
            border-radius: 0 0 5px 5px;
        }
        .autocomplete-item { padding: 10px; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 0.85rem; }
        .autocomplete-item:hover { background: var(--neon-blue); color: black; }

        /* Botões */
        .btn {
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-add { background: transparent; border: 1px dashed var(--neon-blue); color: var(--neon-blue); }
        .btn-add:hover { background: rgba(0,212,255,0.1); }
        .btn-main { background: var(--neon-blue); color: black; margin-top: 20px; }
        .btn-main:hover { box-shadow: 0 0 20px var(--neon-blue); }
        .btn-clear { background: #333; color: white; }

        /* Toggle Almoço */
        .switch-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 20px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 5px;
        }
        .switch { position: relative; display: inline-block; width: 50px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--neon-blue); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Mapa */
        #map { flex-grow: 1; height: 100vh; }

        /* Pop-up de Resultado */
        #modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 3000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #111;
            border: 2px solid var(--neon-blue);
            padding: 40px;
            border-radius: 15px;
            width: 80%;
            max-width: 600px;
            box-shadow: 0 0 50px rgba(0,212,255,0.3);
            position: relative;
        }
        .close-modal { position: absolute; top: 15px; right: 20px; font-size: 25px; cursor: pointer; color: var(--neon-blue); }

        /* Loading */
        #loading {
            display: none;
            position: fixed;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 4000;
            text-align: center;
        }
        .spinner {
            width: 50px; height: 50px;
            border: 5px solid rgba(0,212,255,0.1);
            border-top: 5px solid var(--neon-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Tabela de Resultados */
        .result-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        .result-table th, .result-table td { padding: 10px; border-bottom: 1px solid #333; text-align: left; }
        .result-table th { color: var(--neon-blue); }
    </style>
</head>
<body>

    <div id="loading">
        <div class="spinner"></div>
        <p style="color: var(--neon-blue); margin-top: 10px; font-family: 'Orbitron';">PROCESSANDO ROTA...</p>
    </div>

    <div id="app-container">
        <aside id="side-panel">
            <h1 class="header-logo">FLUXOMED</h1>
            <p style="font-size: 0.8rem; margin-top: -15px; color: #888; margin-bottom: 30px;">SISTEMA DE ROTEIRIZAÇÃO V1.0</p>

            <div class="input-group">
                <label>TÉCNICO RESPONSÁVEL</label>
                <input type="text" id="tech-name" placeholder="Nome do técnico...">
            </div>

            <div id="stops-container">
                <div class="stop-row" data-index="0">
                    <div style="flex-grow: 1; position: relative;">
                        <input type="text" class="address-input" placeholder="Endereço de partida (Ponto 1)" autocomplete="off">
                        <div class="autocomplete-list"></div>
                    </div>
                </div>
                <div class="stop-row" data-index="1">
                    <div style="flex-grow: 1; position: relative;">
                        <input type="text" class="address-input" placeholder="Endereço de destino (Ponto 2)" autocomplete="off">
                        <div class="autocomplete-list"></div>
                    </div>
                </div>
            </div>

            <button class="btn btn-add" onclick="addNewStop()">
                <i class="fas fa-plus-circle"></i> ADICIONAR PARADA
            </button>

            <div class="switch-container">
                <span><i class="fas fa-utensils"></i> SOLICITAR ALMOÇO (R$ 25,90)</span>
                <label class="switch">
                    <input type="checkbox" id="lunch-toggle">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn btn-main" onclick="calculateRoute()">
                <i class="fas fa-route"></i> ROTEIRIZAR ROTAS
            </button>
            <button class="btn btn-clear" onclick="clearAll()">
                <i class="fas fa-trash-alt"></i> LIMPAR ROTA
            </button>
        </aside>

        <main id="map"></main>
    </div>

    <div id="modal-overlay">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modal-title" style="color: var(--neon-blue);">RELATÓRIO DE ROTA</h2>
            <div id="modal-body"></div>
            <button class="btn btn-main" style="width: 100%;" onclick="exportToExcel()">
                <i class="fas fa-file-excel"></i> BAIXAR PLANILHA EXCEL
            </button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        const apiKey = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=';
        let map, routeLayer, markers = [];
        let stopsCoords = []; // Armazena {lat, lng, name}
        let routeData = []; // Para exportação

        // Inicializa Mapa
        function initMap() {
            map = L.map('map', { zoomControl: false }).setView([-22.79, -43.31], 12);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap'
            }).addTo(map);
            L.control.zoom({ position: 'bottomright' }).addTo(map);
        }

        // Adicionar nova parada
        function addNewStop() {
            const container = document.getElementById('stops-container');
            const index = container.children.length;
            const div = document.createElement('div');
            div.className = 'stop-row';
            div.innerHTML = `
                <div style="flex-grow: 1; position: relative;">
                    <input type="text" class="address-input" placeholder="Parada ${index + 1}" autocomplete="off">
                    <div class="autocomplete-list"></div>
                </div>
                <i class="fas fa-trash remove-btn" onclick="this.parentElement.remove(); updateMarkers();"></i>
            `;
            container.appendChild(div);
            setupAutocomplete(div.querySelector('.address-input'));
        }

        // Autocomplete
        function setupAutocomplete(input) {
            let timeout;
            input.addEventListener('input', () => {
                clearTimeout(timeout);
                const query = input.value;
                const list = input.nextElementSibling;
                if (query.length < 3) { list.innerHTML = ''; return; }

                timeout = setTimeout(async () => {
                    const res = await fetch(`https://api.openrouteservice.org/geocode/search?api_key=${apiKey}&text=${query}&boundary.country=BR&size=5`);
                    const data = await res.json();
                    
                    list.innerHTML = '';
                    data.features.forEach(f => {
                        const item = document.createElement('div');
                        item.className = 'autocomplete-item';
                        item.innerText = f.properties.label;
                        item.onclick = () => {
                            input.value = f.properties.label;
                            input.dataset.lat = f.geometry.coordinates[1];
                            input.dataset.lng = f.geometry.coordinates[0];
                            list.innerHTML = '';
                            updateMarkers();
                        };
                        list.appendChild(item);
                    });
                }, 500);
            });
        }

        // Atualiza Pins no Mapa
        function updateMarkers() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            const inputs = document.querySelectorAll('.address-input');
            stopsCoords = [];

            inputs.forEach((input, i) => {
                if (input.dataset.lat) {
                    const latlng = [parseFloat(input.dataset.lat), parseFloat(input.dataset.lng)];
                    const marker = L.marker(latlng).addTo(map).bindPopup(`Parada ${i+1}`);
                    markers.push(marker);
                    stopsCoords.push({latlng, name: input.value});
                }
            });

            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.5));
            }
        }

        // Cálculo da Rota
        async function calculateRoute() {
            if (stopsCoords.length < 2) { alert("Insira pelo menos 2 endereços."); return; }

            document.getElementById('loading').style.display = 'block';
            if (routeLayer) map.removeLayer(routeLayer);

            const coordinates = stopsCoords.map(c => [c.latlng[1], c.latlng[0]]);
            
            try {
                const response = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car/geojson`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': apiKey },
                    body: JSON.stringify({ coordinates: coordinates })
                });
                const data = await response.json();

                // Desenha linha azul
                routeLayer = L.geoJSON(data, {
                    style: { color: '#00d4ff', weight: 5, opacity: 0.7 }
                }).addTo(map);

                processResults(data.features[0].properties.segments);
            } catch (error) {
                alert("Erro ao calcular rota. Verifique a chave API ou endereços.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Processa Valores e Modal
        function processResults(segments) {
            let totalKm = 0;
            let html = `<table class="result-table">
                <tr><th>Ordem</th><th>Endereço</th><th>KM</th><th>Custo</th></tr>`;
            
            routeData = [];
            const kmRate = 0.85;
            const lunchCost = document.getElementById('lunch-toggle').checked ? 25.90 : 0;
            const tech = document.getElementById('tech-name').value || "Não informado";

            // Ponto Inicial
            html += `<tr><td>1</td><td>${stopsCoords[0].name}</td><td>0</td><td>R$ 0,00</td></tr>`;
            routeData.push({ordem: 1, endereco: stopsCoords[0].name, km: 0, custo: 0});

            segments.forEach((seg, i) => {
                const km = seg.distance / 1000;
                const cost = km * kmRate;
                totalKm += km;
                html += `<tr>
                    <td>${i + 2}</td>
                    <td>${stopsCoords[i+1].name}</td>
                    <td>${km.toFixed(2)} km</td>
                    <td>R$ ${cost.toFixed(2)}</td>
                </tr>`;
                routeData.push({ordem: i+2, endereco: stopsCoords[i+1].name, km: km.toFixed(2), custo: cost.toFixed(2)});
            });

            const totalServiceCost = (totalKm * kmRate) + lunchCost;

            html += `</table>
                <div style="margin-top:20px; border-top: 1px solid var(--neon-blue); padding-top:10px;">
                    <p><b>Técnico:</b> ${tech}</p>
                    <p><b>Distância Total:</b> ${totalKm.toFixed(2)} km</p>
                    <p><b>Almoço:</b> R$ ${lunchCost.toFixed(2)}</p>
                    <h3 style="color: var(--neon-blue)">TOTAL: R$ ${totalServiceCost.toFixed(2)}</h3>
                </div>`;

            // Armazena totais para o excel
            routeData.total = totalServiceCost;
            routeData.tech = tech;

            document.getElementById('modal-body').innerHTML = html;
            document.getElementById('modal-overlay').style.display = 'flex';
        }

        // Exportação Excel
        function exportToExcel() {
            const wsData = [
                ["RELATÓRIO DE VISITA - FLUXOMED"],
                ["Técnico:", routeData.tech],
                [],
                ["Ordem da Visita", "Endereço da Visita", "KM (desde último ponto)", "Custo Calculado (R$)"]
            ];

            routeData.forEach(row => {
                wsData.push([row.ordem, row.endereco, row.km, row.custo]);
            });

            wsData.push([]);
            wsData.push(["TOTAL DO DIA", "", "", routeData.total.toFixed(2)]);

            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.aoa_to_sheet(wsData);
            XLSX.utils.book_append_sheet(wb, ws, "Rota");
            XLSX.writeFile(wb, `Rota_Fluxomed_${routeData.tech}.xlsx`);
        }

        function clearAll() {
            location.reload();
        }

        function closeModal() {
            document.getElementById('modal-overlay').style.display = 'none';
        }

        // Inicia
        window.onload = () => {
            initMap();
            document.querySelectorAll('.address-input').forEach(setupAutocomplete);
        };
    </script>
</body>
</html>

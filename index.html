<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Roteirizador Logístico</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#000;
color:white;
}

#map{
height:100vh;
}

.panel{
position:absolute;
top:20px;
left:20px;
width:420px;
background:#0b0b0b;
padding:20px;
border-radius:12px;
box-shadow:0 0 20px rgba(0,150,255,0.6);
z-index:1000;
}

.row{
display:flex;
align-items:center;
margin-bottom:8px;
position:relative;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
background:linear-gradient(145deg,#113a63,#0a1d30);
color:white;
}

.trash{
margin-left:8px;
cursor:pointer;
color:#ff5c5c;
font-size:18px;
}

button{
width:100%;
margin-top:8px;
padding:10px;
border:none;
border-radius:6px;
background:#0077ff;
color:white;
font-weight:bold;
cursor:pointer;
}

.dropdown{
position:absolute;
top:42px;
left:0;
right:30px;
background:#081525;
border-radius:6px;
max-height:180px;
overflow-y:auto;
z-index:9999;
}

.item{
padding:8px;
cursor:pointer;
}

.item:hover{
background:#0077ff;
}

.loading{
display:none;
text-align:center;
margin-top:10px;
}

.spinner{
width:30px;
height:30px;
border-radius:50%;
border:4px solid #222;
border-top:4px solid #00a2ff;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
100%{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="panel">

<h3>Roteirizador Logístico</h3>

<div id="inputs"></div>

<button onclick="addInput()">+ Adicionar parada</button>

<button onclick="calculateRoute()">Roteirizar rota</button>

<button onclick="downloadExcel()">Baixar Excel</button>

<div class="loading" id="loading">
<div class="spinner"></div>
<p>Calculando rota...</p>
</div>

<div id="result"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const apiKey="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=";

let map=L.map("map").setView([-22.9,-43.2],11);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);

let routeLayer;

let routeData=[];

function addInput(){

let div=document.createElement("div");

div.className="row";

div.innerHTML=`
<input type="text" placeholder="Digite endereço..." onkeyup="autocomplete(this)">
<span class="trash" onclick="removeRow(this)">🗑</span>
<div class="dropdown"></div>
`;

document.getElementById("inputs").appendChild(div);

}

function removeRow(el){
el.parentElement.remove();
}

addInput();
addInput();

async function autocomplete(input){

let text=input.value;

if(text.length<3) return;

let url=`https://api.openrouteservice.org/geocode/autocomplete?api_key=${apiKey}&text=${encodeURIComponent(text)}&size=5`;

let res=await fetch(url);

let data=await res.json();

let dropdown=input.parentElement.querySelector(".dropdown");

dropdown.innerHTML="";

data.features.forEach(place=>{

let div=document.createElement("div");

div.className="item";

div.textContent=place.properties.label;

div.onclick=()=>{

input.value=place.properties.label;

input.dataset.lng=place.geometry.coordinates[0];

input.dataset.lat=place.geometry.coordinates[1];

dropdown.innerHTML="";

};

dropdown.appendChild(div);

});

}

async function calculateRoute(){

document.getElementById("loading").style.display="block";

let inputs=document.querySelectorAll("#inputs input");

let coords=[];

inputs.forEach(i=>{

coords.push([parseFloat(i.dataset.lng),parseFloat(i.dataset.lat)]);

});

let response=await fetch("https://api.openrouteservice.org/v2/directions/driving-car",{

method:"POST",

headers:{
"Authorization":apiKey,
"Content-Type":"application/json"
},

body:JSON.stringify({coordinates:coords})

});

let data=await response.json();

document.getElementById("loading").style.display="none";

if(routeLayer) map.removeLayer(routeLayer);

routeLayer=L.geoJSON({
type:"Feature",
geometry:data.routes[0].geometry
}).addTo(map);

map.fitBounds(routeLayer.getBounds());

let steps=data.routes[0].segments[0].steps;

routeData=[];

let html="";

steps.forEach((s,i)=>{

let km=s.distance/1000;

let cost=km*0.85;

let address=document.querySelectorAll("#inputs input")[i].value;

routeData.push({
ordem:i+1,
endereco:address,
distancia:km,
custo:cost
});

html+=`
<b>${i+1}</b> ${address}<br>
Distância desde último endereço: ${km.toFixed(2)} km<br>
Custo desde último endereço: R$ ${cost.toFixed(2)}<br><br>
`;

});

document.getElementById("result").innerHTML=html;

}

function downloadExcel(){

let csv="ordem,endereço,distancia desde o último endereço,custo desde o último endereço\n";

routeData.forEach(r=>{

csv+=`${r.ordem},"${r.endereco}",${r.distancia.toFixed(2)},${r.custo.toFixed(2)}\n`;

});

let blob=new Blob([csv],{type:"text/csv"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="rota_logistica.csv";

a.click();

}

</script>

</body>
</html>

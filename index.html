<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Roteirizador de Visitas</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>

body{
margin:0;
font-family:Arial;
background:#111;
color:white;
}

#map{
height:100vh;
}

.painel{

position:absolute;
top:20px;
left:20px;
z-index:1000;

background:#1c1c1c;
padding:20px;
border-radius:10px;
width:360px;
max-height:90vh;
overflow:auto;

}

input{

width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;

}

button{

margin-top:8px;
padding:8px;
border:none;
border-radius:6px;
cursor:pointer;

}

.btnAdd{
background:#2ecc71;
color:white;
width:100%;
}

.btnRota{
background:#3498db;
color:white;
width:100%;
}

.btnExcluir{
background:#e74c3c;
color:white;
margin-left:5px;
}

.sugestoes{
background:white;
color:black;
max-height:150px;
overflow:auto;
border-radius:6px;
}

.itemSugestao{
padding:8px;
cursor:pointer;
}

.itemSugestao:hover{
background:#eee;
}

.listaItem{
margin-top:8px;
padding:6px;
background:#2a2a2a;
border-radius:6px;
font-size:13px;
}

.distancias{
margin-top:10px;
font-size:13px;
}

.total{
margin-top:10px;
font-weight:bold;
color:#2ecc71;
}

</style>

</head>

<body>

<div class="painel">

<h3>Roteirizador de Visitas</h3>

<input id="endereco" placeholder="Digite o endereço">

<div id="sugestoes" class="sugestoes"></div>

<button class="btnAdd" onclick="adicionarEndereco()">Adicionar endereço</button>

<button class="btnRota" onclick="gerarRota()">Gerar rota</button>

<div id="lista"></div>

<div class="distancias" id="distancias"></div>

<div class="total" id="total"></div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const API_KEY="eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0="

var map=L.map('map').setView([-22.90,-43.20],12)

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19}).addTo(map)

let pontos=[]
let enderecos=[]
let marcadores=[]
let rota=null

let enderecoSelecionado=null

const input=document.getElementById("endereco")
const sugestoes=document.getElementById("sugestoes")

input.addEventListener("input",function(){

let valor=this.value

if(valor.length<3){
sugestoes.innerHTML=""
return
}

fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${valor}`)

.then(r=>r.json())

.then(data=>{

sugestoes.innerHTML=""

data.slice(0,5).forEach(local=>{

let div=document.createElement("div")

div.className="itemSugestao"

div.innerText=local.display_name

div.onclick=function(){

enderecoSelecionado=local

input.value=local.display_name

sugestoes.innerHTML=""

}

sugestoes.appendChild(div)

})

})

})

function adicionarEndereco(){

if(!enderecoSelecionado){
alert("Selecione um endereço da lista")
return
}

let lat=parseFloat(enderecoSelecionado.lat)
let lon=parseFloat(enderecoSelecionado.lon)

let marker=L.marker([lat,lon]).addTo(map)

marker.bindPopup(enderecoSelecionado.display_name)

marcadores.push(marker)

pontos.push([lon,lat])
enderecos.push(enderecoSelecionado.display_name)

atualizarLista()

map.setView([lat,lon],14)

input.value=""
enderecoSelecionado=null

}

function atualizarLista(){

let lista=document.getElementById("lista")

lista.innerHTML=""

enderecos.forEach((end,i)=>{

let div=document.createElement("div")

div.className="listaItem"

div.innerHTML=end+
` <button class="btnExcluir" onclick="remover(${i})">Excluir</button>`

lista.appendChild(div)

})

}

function remover(index){

map.removeLayer(marcadores[index])

marcadores.splice(index,1)
pontos.splice(index,1)
enderecos.splice(index,1)

atualizarLista()

}

function gerarRota(){

if(pontos.length<2){
alert("Adicione pelo menos 2 endereços")
return
}

if(rota){
map.removeLayer(rota)
}

fetch("https://api.openrouteservice.org/v2/directions/driving-car/geojson",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":API_KEY
},

body:JSON.stringify({
coordinates:pontos
})

})

.then(r=>r.json())

.then(data=>{

let coords=data.features[0].geometry.coordinates

let latlngs=coords.map(c=>[c[1],c[0]])

rota=L.polyline(latlngs,{
color:"cyan",
weight:5
}).addTo(map)

map.fitBounds(rota.getBounds())

calcularDistancias(data)

})

}

function calcularDistancias(data){

let segmentos=data.features[0].properties.segments

let div=document.getElementById("distancias")

let totalKm=0

div.innerHTML="<b>Distância entre pontos:</b><br>"

segmentos[0].steps.forEach((step,i)=>{

let km=step.distance/1000

if(km>0.05){

let custo=km*0.85

totalKm+=km

div.innerHTML+=`Trecho: ${km.toFixed(2)} km → R$ ${custo.toFixed(2)}<br>`

}

})

let totalValor=totalKm*0.85

document.getElementById("total").innerHTML=
`Distância total: ${totalKm.toFixed(2)} km<br>
Custo total: R$ ${totalValor.toFixed(2)}`

}

</script>

</body>

</html>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roteirizador de Visitas Fluxomed</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: rgba(10, 20, 40, 0.9);
            --neon-blue: #00d2ff;
            --dark-blue: #003366;
            --text-color: #e0e0e0;
            --accent-color: #3a86ff;
        }

        body, html {
            margin: 0; padding: 0;
            height: 100%;
            font-family: 'Roboto', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
        }

        h1, h2 { font-family: 'Orbitron', sans-serif; text-transform: uppercase; letter-spacing: 2px; }

        #main-container { display: flex; height: 100vh; }

        /* Painel Lateral */
        #side-panel {
            width: 400px;
            background: var(--panel-bg);
            border-right: 2px solid var(--neon-blue);
            padding: 20px;
            box-shadow: 10px 0 20px rgba(0, 210, 255, 0.2);
            z-index: 1000;
            overflow-y: auto;
            backdrop-filter: blur(10px);
        }

        .input-group { margin-bottom: 15px; position: relative; }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--dark-blue);
            color: white;
            border-radius: 5px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { outline: none; border-color: var(--neon-blue); box-shadow: 0 0 10px var(--neon-blue); }

        .address-item { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        
        .btn-remove { color: #ff4d4d; cursor: pointer; transition: 0.3s; }
        .btn-remove:hover { transform: scale(1.2); }

        .btn {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn-primary { background: var(--neon-blue); color: #000; }
        .btn-primary:hover { background: #fff; box-shadow: 0 0 20px var(--neon-blue); }
        
        .btn-secondary { background: transparent; border: 1px solid var(--neon-blue); color: var(--neon-blue); }
        .btn-secondary:hover { background: rgba(0, 210, 255, 0.1); }

        /* Switch Almoço */
        .switch-container {
            display: flex; align-items: center; justify-content: space-between;
            margin: 20px 0; padding: 10px; border: 1px dashed var(--dark-blue);
        }

        .switch {
            position: relative; display: inline-block; width: 50px; height: 24px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #333; transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--neon-blue); }
        input:checked + .slider:before { transform: translateX(26px); }

        /* Mapa */
        #map { flex-grow: 1; background: #000; }

        /* Autocomplete List */
        .autocomplete-items {
            position: absolute; border: 1px solid var(--dark-blue); background: #111;
            z-index: 99; top: 100%; left: 0; right: 0; max-height: 200px; overflow-y: auto;
        }
        .autocomplete-items div { padding: 10px; cursor: pointer; border-bottom: 1px solid #222; }
        .autocomplete-items div:hover { background-color: var(--dark-blue); }

        /* Popup Resultado */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center;
        }
        #result-popup {
            background: var(--panel-bg); border: 2px solid var(--neon-blue);
            padding: 30px; border-radius: 15px; width: 500px; text-align: center;
            box-shadow: 0 0 30px var(--neon-blue);
        }

        /* Loading */
        #loader { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 3000; text-align: center; }
        .spinner {
            width: 80px; height: 80px; border: 8px solid rgba(0, 210, 255, 0.1);
            border-top: 8px solid var(--neon-blue); border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="font-family: 'Orbitron'; margin-top: 15px;">PROCESSANDO ROTA...</p>
    </div>

    <div id="overlay">
        <div id="result-popup">
            <h2 id="pop-tecnico-nome">Relatório de Visitas</h2>
            <hr style="border-color: var(--dark-blue)">
            <div id="summary-content" style="text-align: left; margin: 20px 0;"></div>
            <button class="btn btn-primary" onclick="downloadExcel()"><i class="fas fa-file-excel"></i> BAIXAR EXCEL</button>
            <button class="btn btn-secondary" onclick="closePopup()">FECHAR</button>
        </div>
    </div>

    <div id="main-container">
        <div id="side-panel">
            <h1>Fluxomed</h1>
            <p style="font-size: 0.8em; color: var(--neon-blue);">ROTEIRIZADOR DE VISITAS</p>
            
            <div class="input-group">
                <label>Nome do Técnico</label>
                <input type="text" id="tecnico-nome" placeholder="Ex: João Silva">
            </div>

            <div id="address-container">
                <div class="address-item" id="item-0">
                    <div style="flex-grow: 1; position: relative;">
                        <input type="text" class="addr-input" placeholder="Endereço de Partida" oninput="handleSearch(this)">
                        <div class="autocomplete-items"></div>
                    </div>
                    <i class="fas fa-trash btn-remove" style="visibility: hidden;"></i>
                </div>
                <div class="address-item" id="item-1">
                    <div style="flex-grow: 1; position: relative;">
                        <input type="text" class="addr-input" placeholder="Destino 1" oninput="handleSearch(this)">
                        <div class="autocomplete-items"></div>
                    </div>
                    <i class="fas fa-trash btn-remove" onclick="removeAddress(1)"></i>
                </div>
            </div>

            <button class="btn btn-secondary" onclick="addAddressField()"><i class="fas fa-plus"></i> ADICIONAR PARADA</button>
            
            <div class="switch-container">
                <span>Adicionar Almoço (R$ 25,90)?</span>
                <label class="switch">
                    <input type="checkbox" id="lunch-check">
                    <span class="slider"></span>
                </label>
            </div>

            <button class="btn btn-primary" onclick="calculateRoute()">ROTEIRIZAR ROTAS</button>
            <button class="btn btn-secondary" style="border-color: #ff4d4d; color: #ff4d4d;" onclick="clearAll()"><i class="fas fa-sync"></i> LIMPAR ROTA</button>
        </div>

        <div id="map"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script>
        const API_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=';
        const KM_PRICE = 0.85;
        const LUNCH_PRICE = 25.90;

        let map = L.map('map', { zoomControl: false }).setView([-22.79, -43.31], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        let markers = [];
        let routeLayer = null;
        let routeData = []; // Para armazenar coords dos endereços selecionados

        // Função Autocomplete
        async function handleSearch(input) {
            const query = input.value;
            const listContainer = input.nextElementSibling;
            listContainer.innerHTML = '';

            if (query.length < 3) return;

            try {
                const response = await fetch(`https://api.openrouteservice.org/geocode/autocomplete?api_key=${API_KEY}&text=${query}&boundary.country=BR&size=5`);
                const data = await response.json();

                data.features.forEach(feature => {
                    const item = document.createElement('div');
                    item.innerHTML = feature.properties.label;
                    item.onclick = () => {
                        input.value = feature.properties.label;
                        input.dataset.coords = JSON.stringify(feature.geometry.coordinates);
                        listContainer.innerHTML = '';
                        updateMapPreview();
                    };
                    listContainer.appendChild(item);
                });
            } catch (e) { console.error("Erro no geocoding", e); }
        }

        function addAddressField() {
            const container = document.getElementById('address-container');
            const id = Date.now();
            const div = document.createElement('div');
            div.className = 'address-item';
            div.id = `item-${id}`;
            div.innerHTML = `
                <div style="flex-grow: 1; position: relative;">
                    <input type="text" class="addr-input" placeholder="Nova Parada" oninput="handleSearch(this)">
                    <div class="autocomplete-items"></div>
                </div>
                <i class="fas fa-trash btn-remove" onclick="removeAddress('${id}')"></i>
            `;
            container.appendChild(div);
        }

        function removeAddress(id) {
            document.getElementById(`item-${id}`).remove();
            updateMapPreview();
        }

        function updateMapPreview() {
            markers.forEach(m => map.removeLayer(m));
            markers = [];
            const inputs = document.querySelectorAll('.addr-input');
            const coordsList = [];

            inputs.forEach(input => {
                if (input.dataset.coords) {
                    const coords = JSON.parse(input.dataset.coords); // [lon, lat]
                    coordsList.push(coords);
                    const marker = L.marker([coords[1], coords[0]]).addTo(map);
                    markers.push(marker);
                }
            });

            if (markers.length > 0) {
                const group = new L.featureGroup(markers);
                map.fitBounds(group.getBounds().pad(0.5));
            }
        }

        async function calculateRoute() {
            const inputs = document.querySelectorAll('.addr-input');
            const coords = Array.from(inputs)
                                .filter(i => i.dataset.coords)
                                .map(i => JSON.parse(i.dataset.coords));

            if (coords.length < 2) {
                alert("Insira pelo menos dois endereços válidos.");
                return;
            }

            document.getElementById('loader').style.display = 'block';

            try {
                const response = await fetch(`https://api.openrouteservice.org/v2/directions/driving-car/geojson`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': API_KEY },
                    body: JSON.stringify({ coordinates: coords })
                });
                const data = await response.json();

                if (routeLayer) map.removeLayer(routeLayer);

                routeLayer = L.geoJSON(data, {
                    style: { color: '#00d2ff', weight: 5, opacity: 0.7 }
                }).addTo(map);

                processResults(data, coords, Array.from(inputs).map(i => i.value));

            } catch (e) {
                alert("Erro ao calcular rota.");
            } finally {
                document.getElementById('loader').style.display = 'none';
            }
        }

        let lastCalculation = [];

        function processResults(geojson, coords, addressNames) {
            const segments = geojson.features[0].properties.segments;
            let totalDist = 0;
            let totalCost = 0;
            let html = "";
            lastCalculation = [];

            segments.forEach((seg, i) => {
                const distKm = seg.distance / 1000;
                const cost = distKm * KM_PRICE;
                totalDist += distKm;
                totalCost += cost;

                lastCalculation.push({
                    ordem: i + 1,
                    destino: addressNames[i+1],
                    distancia: distKm.toFixed(2),
                    custo: cost.toFixed(2)
                });

                html += `<p><strong>${i+1}ª Parada:</strong> ${distKm.toFixed(2)} km - R$ ${cost.toFixed(2)}</p>`;
            });

            const lunchActive = document.getElementById('lunch-check').checked;
            if (lunchActive) totalCost += LUNCH_PRICE;

            document.getElementById('summary-content').innerHTML = `
                ${html}
                <hr style="border-color: #222">
                <p>Distância Total: ${totalDist.toFixed(2)} km</p>
                <p>Almoço: ${lunchActive ? 'R$ 25,90' : 'Não'}</p>
                <h3 style="color: var(--neon-blue)">TOTAL: R$ ${totalCost.toFixed(2)}</h3>
            `;

            document.getElementById('pop-tecnico-nome').innerText = "Técnico: " + (document.getElementById('tecnico-nome').value || "Não informado");
            document.getElementById('overlay').style.display = 'flex';
        }

        function downloadExcel() {
            const tecnico = document.getElementById('tecnico-nome').value || "Não informado";
            const lunchActive = document.getElementById('lunch-check').checked;
            
            const data = lastCalculation.map(item => ({
                "Ordem": item.ordem,
                "Endereço": item.destino,
                "KM (ponto a ponto)": item.distancia,
                "Custo (R$)": item.custo
            }));

            const ws = XLSX.utils.json_to_sheet(data);
            
            // Adicionando Totais no rodapé
            const totalKm = lastCalculation.reduce((acc, curr) => acc + parseFloat(curr.distancia), 0);
            const totalCusto = lastCalculation.reduce((acc, curr) => acc + parseFloat(curr.custo), 0) + (lunchActive ? LUNCH_PRICE : 0);

            XLSX.utils.sheet_add_aoa(ws, [
                [],
                ["TÉCNICO:", tecnico],
                ["ALMOÇO:", lunchActive ? "R$ 25,90" : "R$ 0,00"],
                ["DISTÂNCIA TOTAL:", totalKm.toFixed(2) + " KM"],
                ["CUSTO TOTAL DO DIA:", "R$ " + totalCusto.toFixed(2)]
            ], { origin: -1 });

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Rota Fluxomed");
            XLSX.writeFile(wb, `Rota_${tecnico}.xlsx`);
        }

        function closePopup() { document.getElementById('overlay').style.display = 'none'; }

        function clearAll() {
            location.reload();
        }
    </script>
</body>
</html>

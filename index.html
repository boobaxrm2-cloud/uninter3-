<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluxomed | Roteirizador Premium</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --uber-black: #000000;
            --uber-dark-grey: #121212;
            --uber-blue: #276ef1;
            --text-white: #ffffff;
        }

        body {
            background-color: var(--uber-black);
            color: var(--text-white);
            font-family: 'Inter', sans-serif;
            margin: 0; padding: 20px;
            display: flex; flex-direction: column; align-items: center;
        }

        .main-layout {
            display: flex;
            width: 100%;
            max-width: 1200px;
            gap: 20px;
            height: 85vh;
        }

        /* Coluna da Esquerda: Inputs */
        .sidebar {
            flex: 1;
            background: var(--uber-dark-grey);
            padding: 20px;
            border-radius: 12px;
            overflow-y: auto;
            border: 1px solid #333;
        }

        /* Coluna da Direita: Mapa */
        #map {
            flex: 2;
            border-radius: 12px;
            border: 1px solid #333;
            background: #1a1a1a;
        }

        h1 { font-size: 1.2rem; color: var(--uber-blue); margin-bottom: 20px; text-align: center; }

        .input-group { position: relative; margin-bottom: 12px; display: flex; }
        
        .input-group input {
            width: 100%; padding: 12px;
            background: #222; border: 1px solid #444;
            color: white; border-radius: 6px; outline: none;
        }

        .remove-btn {
            background: none; border: none; color: #ff4d4d;
            cursor: pointer; padding: 0 10px;
        }

        .autocomplete-list {
            position: absolute; top: 45px; left: 0; width: 100%;
            background: #222; z-index: 9999; border-radius: 4px;
            max-height: 200px; overflow-y: auto; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .autocomplete-item {
            padding: 10px; cursor: pointer; border-bottom: 1px solid #333; font-size: 0.85rem;
        }

        .autocomplete-item:hover { background: #333; }

        .btn-panel { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        
        button {
            padding: 12px; border: none; border-radius: 6px;
            cursor: pointer; font-weight: bold; transition: 0.2s;
        }

        .btn-add { background: #333; color: white; }
        .btn-route { background: var(--uber-blue); color: white; }
        .btn-clear { background: #444; color: #ff4d4d; }
        .btn-excel { background: #1d6f42; color: white; display: none; }

        /* Modal */
        #modal {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); background: #111;
            padding: 25px; border-radius: 12px; z-index: 10001;
            border: 1px solid var(--uber-blue); width: 320px; text-align: center;
        }

        .overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 10000;
        }

        #loader { display: none; border: 3px solid #f3f3f3; border-top: 3px solid var(--uber-blue); border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; margin: 10px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <h1>ROTEIRIZADOR DE VISITAS FLUXOMED</h1>

    <div class="main-layout">
        <div class="sidebar">
            <div id="address-container">
                <div class="input-group">
                    <input type="text" placeholder="Partida (Ex: Rua Nome, 123)" class="address-input">
                    <div class="autocomplete-list"></div>
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Destino 1" class="address-input">
                    <div class="autocomplete-list"></div>
                </div>
            </div>

            <div class="btn-panel">
                <button class="btn-add" onclick="addInput()"><i class="fas fa-plus"></i> Adicionar Parada</button>
                <button class="btn-route" onclick="calculateRoute()">Roteirizar Rota</button>
                <button class="btn-clear" onclick="clearAll()">Limpar</button>
                <div id="loader"></div>
                <button id="btn-excel" class="btn-excel" onclick="generateExcel()"><i class="fas fa-file-excel"></i> Baixar Planilha</button>
            </div>
        </div>

        <div id="map"></div>
    </div>

    <div class="overlay" id="overlay"></div>
    <div id="modal" id="modal">
        <h3 style="color: var(--uber-blue)">Resultado</h3>
        <div id="result-content" style="margin: 15px 0; font-size: 0.9rem; text-align: left;"></div>
        <button class="btn-route" style="width:100%" onclick="closeModal()">OK</button>
    </div>

<script>
    const ORS_KEY = 'eyJvcmciOiI1YjNjZTM1OTc4NTExMTAwMDFjZjYyNDgiLCJpZCI6IjBkNDRmZDJkNmQzMTRkZWQ4YWYyZGIzODY1NzViNjA5IiwiaCI6Im11cm11cjY0In0=';
    let map, routeLayer, markers = [];
    let routeData = [];

    // Inicializa o Mapa com tema escuro (CartoDB DarkMatter)
    function initMap() {
        map = L.map('map').setView([-23.5505, -46.6333], 12);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap'
        }).addTo(map);
    }

    function addInput() {
        const div = document.createElement('div');
        div.className = 'input-group';
        div.innerHTML = `
            <input type="text" placeholder="Parada" class="address-input">
            <div class="autocomplete-list"></div>
            <button class="remove-btn" onclick="this.parentElement.remove()"><i class="fas fa-times"></i></button>
        `;
        document.getElementById('address-container').appendChild(div);
        attachAutocomplete(div.querySelector('.address-input'));
    }

    // Autocomplete usando Nominatim (melhor para números de porta)
    function attachAutocomplete(input) {
        const list = input.nextElementSibling;
        let timeout;

        input.addEventListener('input', () => {
            clearTimeout(timeout);
            const query = input.value;
            if (query.length < 4) { list.innerHTML = ''; return; }

            timeout = setTimeout(async () => {
                try {
                    const res = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&addressdetails=1&countrycodes=br&limit=5`);
                    const data = await res.json();
                    list.innerHTML = '';
                    data.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'autocomplete-item';
                        // Monta o endereço detalhado
                        const addr = item.display_name;
                        div.innerText = addr;
                        div.onclick = () => {
                            input.value = addr;
                            input.dataset.lat = item.lat;
                            input.dataset.lng = item.lon;
                            list.innerHTML = '';
                        };
                        list.appendChild(div);
                    });
                } catch (e) { console.error("Erro na busca"); }
            }, 600);
        });
    }

    async function calculateRoute() {
        const inputs = Array.from(document.querySelectorAll('.address-input'));
        const coords = inputs
            .filter(i => i.dataset.lat)
            .map(i => [parseFloat(i.dataset.lng), parseFloat(i.dataset.lat)]);

        if (coords.length < 2) {
            alert("Por favor, selecione os endereços nas sugestões da lista para capturar o número correto.");
            return;
        }

        document.getElementById('loader').style.display = 'block';

        try {
            const response = await fetch('https://api.openrouteservice.org/v2/directions/driving-car/geojson', {
                method: 'POST',
                headers: { 'Authorization': ORS_KEY, 'Content-Type': 'application/json' },
                body: JSON.stringify({ coordinates: coords })
            });
            const data = await response.json();

            // Limpa mapa anterior
            if (routeLayer) map.removeLayer(routeLayer);
            markers.forEach(m => map.removeLayer(m));
            markers = [];

            // Desenha a rota
            routeLayer = L.geoJSON(data, {
                style: { color: '#276ef1', weight: 5, opacity: 0.7 }
            }).addTo(map);

            // Adiciona Marcadores
            coords.forEach((c, idx) => {
                const marker = L.marker([c[1], c[0]]).addTo(map)
                    .bindPopup(`Parada ${idx + 1}`);
                markers.push(marker);
            });

            map.fitBounds(routeLayer.getBounds());

            // Processa dados para Modal e Excel
            const segments = data.features[0].properties.segments;
            let totalKm = 0;
            let html = '';
            routeData = [];

            inputs.forEach((inp, i) => {
                let dist = i === 0 ? 0 : segments[i-1].distance / 1000;
                let cost = dist * 0.85;
                totalKm += dist;

                routeData.push({
                    ordem: i + 1,
                    endereco: inp.value,
                    km: dist.toFixed(2),
                    custo: cost.toFixed(2)
                });

                html += `<p><b>${i+1}º:</b> ${inp.value.split(',')[0]}... <br>Dist: ${dist.toFixed(2)} km | R$ ${cost.toFixed(2)}</p>`;
            });

            document.getElementById('result-content').innerHTML = html + `<hr><b>Total: ${totalKm.toFixed(2)} km<br>Custo Total: R$ ${(totalKm * 0.85).toFixed(2)}</b>`;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('modal').style.display = 'block';
            document.getElementById('btn-excel').style.display = 'block';

        } catch (err) {
            alert("Erro ao traçar rota. Verifique sua chave API.");
        } finally {
            document.getElementById('loader').style.display = 'none';
        }
    }

    function generateExcel() {
        let totalAcumulado = 0;
        const sheetData = routeData.map(item => {
            totalAcumulado += parseFloat(item.custo);
            return {
                "Ordem": item.ordem,
                "Endereço": item.endereco,
                "KM Trecho": item.km,
                "Valor Trecho (R$)": item.custo,
                "Valor Total Rota (R$)": totalAcumulado.toFixed(2)
            };
        });
        const ws = XLSX.utils.json_to_sheet(sheetData);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Fluxomed");
        XLSX.writeFile(wb, "Roteiro_Fluxomed.xlsx");
    }

    function clearAll() {
        location.reload();
    }

    function closeModal() {
        document.getElementById('overlay').style.display = 'none';
        document.getElementById('modal').style.display = 'none';
    }

    window.onload = () => {
        initMap();
        document.querySelectorAll('.address-input').forEach(attachAutocomplete);
    };
</script>
</body>
</html>
